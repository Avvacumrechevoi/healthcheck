name: Sync data from Google Drive

on:
  schedule:
    - cron: '0 8,20 * * *'   # 08:00 and 20:00 UTC (2x/day)
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sync/requirements.txt

      - name: Sync Google Drive → data.json
        env:
          DRIVE_FOLDER_ID: ${{ vars.DRIVE_FOLDER_ID || '1cyQ59HtuH3v2J5zB8DUbiOgXKqZyDazD' }}
        run: python sync/sync_drive_folder.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet health-check-dashboard/data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health-check-dashboard/data.json
          git commit -m "data: auto-sync from Google Drive $(date -u +%Y-%m-%d_%H:%M)"
          git push
