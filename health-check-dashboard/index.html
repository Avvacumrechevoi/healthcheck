<script>
/*

// ═══ 1. CONFIG ═══
const DEF_TH = {

  dep_approval:{g:80,y:60,u:"%",l:"Approval депозитов",d:"h"},wd_approval:{g:75,y:55,u:"%",l:"Approval выводов",d:"h"},avg_deposit:{g:25,y:12,u:"$",l:"Средний депозит",d:"h"},cashout_pct:{g:90,y:100,u:"%",l:"Cashout %",d:"l"},

  casino_share:{g:30,y:20,u:"%",l:"Доля Casino GGR",d:"h"},casino_margin:{g:5,y:2,u:"%",l:"Маржа Casino",d:"h"},casino_players:{g:1000,y:300,u:"",l:"Casino игроки",d:"h"},casino_ggr_mom:{g:0,y:-10,u:"%",l:"Casino GGR MoM",d:"h"},
  sport_margin:{g:8,y:4,u:"%",l:"Маржа Sport",d:"h"},sport_players:{g:100,y:20,u:"",l:"Sport ставок/день",d:"h"},sport_ggr_mom:{g:0,y:-10,u:"%",l:"Sport GGR MoM",d:"h"},avg_bet:{g:25,y:10,u:"$",l:"Средняя ставка",d:"h"},
  d30_retention:{g:25,y:15,u:"%",l:"Ret M1 (активация)",d:"h"},d90_retention:{g:10,y:5,u:"%",l:"Ret M3 (стабилиз.)",d:"h"},core_retention:{g:25,y:12,u:"%",l:"Удержание ядра (4+/6м)",d:"h"},active_mom:{g:10,y:0,u:"%",l:"Активные MoM",d:"h"},
  bettor_pct:{g:15,y:5,u:"%",l:"Доля бетторов",d:"h"},active_daily:{g:50,y:15,u:"",l:"DAU",d:"h"},dau_pct:{g:15,y:8,u:"%",l:"DAU/AU (stickiness)",d:"h"},bettor_ret:{g:40,y:25,u:"%",l:"Retention бетторов",d:"h"},whale_top20:{g:40,y:60,u:"%",l:"Конц. TOP20 в NGR",d:"l"},
  frt_sec:{g:30,y:60,u:"с",l:"FRT (медиана)",d:"l"},csat:{g:70,y:55,u:"%",l:"CSAT",d:"h"},abandon_rate:{g:3,y:8,u:"%",l:"AR% пропущено",d:"l"},aht_min:{g:10,y:18,u:"м",l:"AHT (медиана)",d:"l"},
};
const ALL_METRICS = Object.keys(DEF_TH);

const CATS = {
  payments:{l:"Платежи",i:"💳",m:["dep_approval","wd_approval","avg_deposit","cashout_pct"],w:25},
  revenue:{l:"Выручка",i:"💰",m:["ngr_mom","margin_pct","arppu"],w:20},
  acquisition:{l:"Привлечение",i:"📥",m:["au","ftd_count","reg_ftd_conv","cac"],w:15},
  retention:{l:"Удержание",i:"🔄",m:["d30_retention","d90_retention","core_retention","active_mom"],w:15},
  sport:{l:"Спорт",i:"⚽",m:["sport_margin","sport_players","sport_ggr_mom","avg_bet"],w:10},
  casino:{l:"Казино",i:"🎰",m:["casino_share","casino_margin","casino_players","casino_ggr_mom"],w:7},
  player_health:{l:"База игроков",i:"👥",m:["dau_pct","bettor_pct","bettor_ret","whale_top20"],w:5},
  support:{l:"Саппорт",i:"🎧",m:["frt_sec","csat","abandon_rate","aht_min"],w:3},
};
const SM = ["ngr","ngr_mom","dep_approval","core_retention","d90_retention","csat"];

// ═══ 2. SETTINGS ═══
let customTH = {};
try { customTH = JSON.parse(localStorage.getItem("hc_th") || "{}"); } catch(e) {}
let settingsCat = "payments";
function getTH(mk) { return customTH[mk] ? {...DEF_TH[mk], ...customTH[mk]} : DEF_TH[mk]; }

// ═══ 3. DYNAMIC DATA ═══
let D = {}, PREV = {}, TREND = {}, HISTORY = {}, PLAT_TREND = [], PLAT_HISTORY = {}, TL = [], FLAGS = {}, SEGMENTS = {};
let FUNNEL = {}, RETENTION_TABLE = {}, PLATFORM_COHORTS = [], GEO_COHORTS = {}, MARGIN_DYN = {};
let META = { month: "", month_short: "", prev_month_short: "", version: "v31", updated: "" };
let dataSource = "none";

// Dynamic date helpers
function metaMonth() { return META.month || "—"; }
function metaPrev() { return META.prev_month_short || "prev"; }
function metaCur() { return META.month_short || "cur"; }
function metaPeriodLabel() {
  const p = META.periods;
  if (!p || !p.length) return metaMonth();
  if (p.length >= 3) {
    const months = p.map(s => parseInt(s.split("-")[1]));
    const year = p[p.length-1].split("-")[0];
    const q = Math.ceil(months[months.length-1] / 3);
    const allSameQ = months.every(m => Math.ceil(m/3) === q);
    if (allSameQ && months.length === 3) return `Q${q} ${year.slice(2)}`;
  }
  return metaMonth();
}
function metaTrendLabel() {
  const tl = TL;
  if (!tl || tl.length < 2) return "";
  return `${tl[0]}'→${tl[tl.length-1]}'`;
}

function hasLocalData() {
  try { return !!localStorage.getItem("hc_data"); } catch(e) { return false; }
}

function loadLocalData() {
  try {
    const raw = localStorage.getItem("hc_data");
    if (!raw) return false;
    return applyDataset(JSON.parse(raw), "localStorage");
  } catch(e) { return false; }
}

function applyDataset(ds, source) {
  try {
    if (ds.meta) META = {...META, ...ds.meta};
    D = ds.data || {};
    PREV = ds.prev || {};
    TREND = ds.trend || {};
    HISTORY = ds.history || {};
    PLAT_TREND = ds.plat_trend || [];
    PLAT_HISTORY = ds.plat_history || {};
    TL = ds.trend_labels || [];
    FLAGS = ds.flags || {};
    SEGMENTS = ds.segments || {};
    FUNNEL = ds.funnel || {};
    RETENTION_TABLE = ds.retention_table || {};
    PLATFORM_COHORTS = ds.platform_cohorts || [];
    GEO_COHORTS = ds.geo_cohorts || {};
    MARGIN_DYN = ds.margin_dynamics || {};
    dataSource = source || "unknown";
    document.title = `Health Check · SapphireBet · ${META.month}`;
    return true;
  } catch(e) { return false; }
}

function saveDataToLocal() {
  const ds = getDataset();
  localStorage.setItem("hc_data", JSON.stringify(ds));
  dataSource = "localStorage";
}

function getDataset() {
  return { meta: META, flags: FLAGS, trend_labels: TL, plat_trend: PLAT_TREND, plat_history: PLAT_HISTORY, prev: PREV, trend: TREND, history: HISTORY, data: D, segments: SEGMENTS, funnel: FUNNEL, retention_table: RETENTION_TABLE, platform_cohorts: PLATFORM_COHORTS, geo_cohorts: GEO_COHORTS, margin_dynamics: MARGIN_DYN };
}

async function loadData() {
  if (loadLocalData()) {
    rebuildGeoList();
    render();
    return;
  }
  try {
    const res = await fetch("data.json?" + Date.now());
    if (!res.ok) throw new Error(res.status);
    const ds = await res.json();
    applyDataset(ds, "data.json");
  } catch(e) {
    dataSource = "empty";
  }
  rebuildGeoList();
  render();
}

// ═══ 4. SCORING ═══
const NO = v => v == null || v === undefined;
function scr(k, v) {
  if (NO(v)) return null;
  const t = getTH(k); if (!t) return 50;
  const {g, y, d} = t;
  if (d === "h") {
    if (v >= g) return 100;
    if (v <= y) { return y > 0 ? Math.max(0, v/y*49) : Math.max(0, 49*(1-(y-v)/Math.max(Math.abs(y),1))); }
    return 50 + ((v-y)/(g-y)) * 50;
  } else {
    if (v <= g) return 100;
    if (v >= y) return Math.max(0, 49*(1-(v-y)/Math.max(Math.abs(y),1)));
    return 50 + ((y-v)/(y-g)) * 50;
  }
}
function catSc(d, ck) { const s = CATS[ck].m.map(m => scr(m, d[m])).filter(x => x !== null); return s.length ? s.reduce((a,b) => a+b, 0)/s.length : null; }
function geoSc(d) { let tw=0, ts=0; Object.entries(CATS).forEach(([k,c]) => { const s = catSc(d,k); if (s !== null) { tw += c.w; ts += s*c.w; } }); return tw ? ts/tw : null; }
function cl(s) { if (NO(s)) return {bg:"#e0e2ea",gw:"#555",tx:"#555",lb:"—"}; const r=Math.round(s); if (r>=70) return {bg:"#dcfce7",gw:"#16a34a",tx:"#16a34a",lb:"Норма"}; if (r>=40) return {bg:"#fef3c7",gw:"#d97706",tx:"#d97706",lb:"Внимание"}; return {bg:"#fecaca",gw:"#dc2626",tx:"#dc2626",lb:"Проблема"}; }
function fmt(v) { if (NO(v)) return "—"; if (typeof v !== "number") return v; if (v<0 && Math.abs(v)>=1000) return "-"+(Math.abs(v)/1000).toFixed(1)+"K"; if (Math.abs(v)>=10000) return (v/1000).toFixed(0)+"K"; if (Math.abs(v)>=1000) return (v/1000).toFixed(1)+"K"; return Number.isInteger(v) ? String(v) : v.toFixed(1); }
function fmtNGR(v) { if (NO(v)) return "—"; if (v<0) return "-$"+(Math.abs(v)/1000).toFixed(1)+"K"; return "$"+(v/1000).toFixed(v>=100000?0:1)+"K"; }

// ═══ 5. UI BUILDERS ═══
function sphereHTML(s, sz, label, sub, flag, grayFirst) {
  const c = flag ? {bg:"#fecaca",gw:"#dc2626",tx:"#dc2626"} : cl(s);
  const muted = grayFirst && !flag && !NO(s) && Math.round(s) >= 70;
  const mc = muted ? {bg:"#dcfce7",gw:"#16a34a",tx:"#16a34a88"} : c;
  const anim = ((s !== null && s < 40) || flag) ? "animation:pr 2s infinite;" : "";
  const bg = flag ? `radial-gradient(circle at 35% 35%,#ffffff66,#fecaca 80%)` : `radial-gradient(circle at 35% 35%,#ffffff66,${mc.bg} 80%)`;
  const shadow = `0 2px 8px ${mc.gw}22,0 1px 4px rgba(0,0,0,0.08)`;
  const txt = flag ? "⛔" : NO(s) ? "?" : Math.round(s);
  const subTxt = flag ? "ПС отключены" : sub || "";
  return `<div class="sphere" style="max-width:${sz*1.8}px"><div class="sphere-orb" style="width:${sz}px;height:${sz}px;background:${bg};box-shadow:${shadow};border:2px solid ${mc.gw}33;${anim}${muted?"opacity:.75":""}"><span class="mono" style="color:${mc.gw};font-weight:700;font-size:${flag?sz/3.5:sz/3}px">${txt}</span></div><span class="sphere-label" style="font-size:${Math.max(10,sz/7.5)}px;color:${flag?"#dc2626":"#333"}">${label}</span>${subTxt ? `<span class="sphere-sub mono" style="color:${mc.tx}">${subTxt}</span>` : ""}</div>`;
}

function metricHTML(mk, val, prev) {
  const t = getTH(mk); const s = scr(mk, val); const c = cl(s); const n = NO(val);
  const sign = !n && val > 0 && (mk.includes("mom") || mk === "active_mom") ? "+" : "";
  const hasPrev = !NO(prev); const delta = hasPrev ? (val - prev) : 0;
  const arrow = hasPrev ? (delta > 0 ? "↑" : delta < 0 ? "↓" : "→") : "";
  const arrowC = hasPrev ? (t.d === "h" ? (delta > 0 ? "#16a34a88" : "#dc262688") : (delta < 0 ? "#16a34a88" : "#dc262688")) : "";
  const prevLabel = META.prev_month_short || "prev";
  const tooltip = `${t.l}: ${NO(val) ? 'нет данных' : val + (t.u||'')}. Score: ${NO(s) ? 'N/A' : Math.round(s)+'/100'}. ${t.d==='h' ? 'Больше = лучше' : 'Меньше = лучше'}. Зелёный: ${t.d==='h'?'≥':'≤'}${t.g}, Жёлтый: ${t.d==='h'?'≥':'≤'}${t.y}`;
  return `<div class="metric-row" title="${tooltip}" style="background:${n?"#12121e":`${c.bg}`};border-left-color:${n?"#d0d2da":c.gw};opacity:${n?.4:1}"><div style="width:7px;height:7px;border-radius:50%;background:${n?"#333":c.gw};${n?"":"box-shadow:0 0 5px "+c.gw};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="color:${n?"#444":"#999"};font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.l}${n?" ⬜":""}</div>${!n?`<div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.max(5,s??0))}%;background:linear-gradient(90deg,${c.gw}88,${c.gw})"></div></div>`:""}</div><div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0"><span class="mono" style="color:${n?"#333":c.tx};font-weight:700;font-size:14px">${n?"—":`${sign}${fmt(val)}${t.u}`}</span>${hasPrev&&!n?`<span class="mono" style="color:${arrowC};font-size:8px;opacity:.7">${arrow} ${prevLabel} ${fmt(prev)}</span>`:""}</div><span class="mono" style="color:${n?"#e0e2ea":"#3a3a55"};font-size:8px;flex-shrink:0;min-width:36px;text-align:right">→${fmt(t.g)}${t.u}</span></div>`;
}

function summaryHTML(d, prev, hist) {
  return `<div style="margin-bottom:10px"><div class="grid-sum">${SM.map(mk => {
    const t = getTH(mk); const v = d[mk]; const pv = prev?.[mk]; const s = scr(mk, v); const c = cl(s);
    const hasPrev = !NO(pv); const delta = hasPrev ? (v-pv) : 0;
    const arrow = hasPrev ? (delta > 0 ? "↑" : delta < 0 ? "↓" : "") : "";
    const arrowC = hasPrev ? (t.d === "h" ? (delta > 0 ? "#16a34a88" : "#dc262688") : (delta < 0 ? "#16a34a88" : "#dc262688")) : "";
    const histKey = mk === "ngr" ? "ngr" : mk === "d90_retention" ? null : mk === "core_retention" ? null : mk === "dep_approval" ? null : mk === "csat" ? null : mk === "ngr_mom" ? null : null;
    const hData = hist && histKey ? hist[histKey] : null;
    const miniSpark = hData && hData.length >= 2 ? buildSparkSVG(hData, 20, 60).svg : "";
    return `<div style="background:#f8f9fc;border-radius:8px;padding:7px 9px;border:1px solid ${!NO(v)?c.gw+"12":"#e0e2ea"};opacity:${NO(v)?.35:1}"><div style="color:#777;font-size:9px;margin-bottom:3px;line-height:1.2">${t.l}</div><div style="display:flex;align-items:baseline;gap:3px"><span class="mono" style="color:${!NO(v)?c.tx:"#333"};font-size:14px;font-weight:700">${!NO(v)&&v>0&&mk.includes("mom")?"+":""}${fmt(v)}${!NO(v)?t.u:""}</span>${hasPrev&&!NO(v)?`<span class="mono" style="color:${arrowC};font-size:8px">${arrow}</span>`:""}</div>${miniSpark?`<div style="margin-top:2px">${miniSpark}</div>`:""}</div>`;
  }).join("")}</div></div>`;
}

function buildSparkSVG(data, h, w, yFmt) {
  if (!data || data.length < 2) return {svg:"", lastV:0, lastC:"#555", mn:0, mx:0};
  const showAxis = !!yFmt;
  const lpad = showAxis ? 36 : 4, pad = 4, cw = w-lpad-pad, ch = h-pad*2;
  const mn = Math.min(...data), mx = Math.max(...data), range = mx-mn || 1;
  const pts = data.map((v,i) => `${lpad+i/(data.length-1)*cw},${pad+ch-(v-mn)/range*ch}`).join(" ");
  const lastV = data[data.length-1]; const lastC = lastV >= 0 ? "#16a34a" : "#dc2626";
  const zeroY = mn < 0 ? pad+ch-(-mn)/range*ch : null;
  const circles = data.map((v,i) => {const x=lpad+i/(data.length-1)*cw;const y_=pad+ch-(v-mn)/range*ch;const c=v>=0?"#16a34a":"#dc2626";return `<circle cx="${x}" cy="${y_}" r="${i===data.length-1?3:1.5}" fill="${i===data.length-1?c:c+'66'}" ${i===data.length-1?'stroke="#fff" stroke-width="1"':""}/>`}).join("");
  const zeroLine = zeroY ? `<line x1="${lpad}" y1="${zeroY}" x2="${w-pad}" y2="${zeroY}" stroke="#dc262622" stroke-dasharray="3,3"/>` : "";
  let yLabels = "", gridLines = "";
  if (showAxis) {
    const mid = (mn+mx)/2;
    yLabels = [{v:mx,y:pad},{v:mid,y:pad+ch/2},{v:mn,y:pad+ch}].map(({v,y}) => `<text x="${lpad-3}" y="${y+3}" text-anchor="end" fill="#999" font-size="7" font-family="'JetBrains Mono',monospace">${yFmt(v)}</text>`).join("");
    gridLines = [pad, pad+ch/2, pad+ch].map(y => `<line x1="${lpad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#e0e2ea" stroke-dasharray="2,4"/>`).join("");
  }
  return {svg:`<svg width="100%" viewBox="0 0 ${w} ${h}" style="display:block">${gridLines}${zeroLine}${yLabels}<polyline points="${pts}" fill="none" stroke="${lastC}" stroke-width="2" stroke-linejoin="round"/>${circles}</svg>`, lastV, lastC, mn, mx};
}

function sparkHTML(geo) {
  const data = TREND[geo]; if (!data || !data.length) return "";
  const {svg, lastV, lastC} = buildSparkSVG(data, 50, 240, v => "$"+(v/1000).toFixed(0)+"K");
  const labels = TL.map((l,i) => `<span class="mono" style="color:${i===TL.length-1?"#aaa":"#666"};font-size:8px">${l}</span>`).join("");
  return `<div class="spark"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="mono" style="color:#777;font-size:9px">NGR · ${TL.length}мес (${metaTrendLabel()})</span><span class="mono" style="color:${lastC};font-size:10px;font-weight:700">${fmtNGR(lastV)}</span></div>${svg}<div style="display:flex;justify-content:space-between;padding:0 2px">${labels}</div></div>`;
}

function platSparkHTML() {
  if (!PLAT_TREND.length) return "";
  const {svg, lastV, lastC} = buildSparkSVG(PLAT_TREND, 40, 240, v => "$"+(v/1000).toFixed(0)+"K");
  const labels = TL.map((l,i) => `<span class="mono" style="color:${i===TL.length-1?"#555":"#bbb"};font-size:9px">${l}</span>`).join("");
  
  // Key stats below chart
  const ph = PLAT_HISTORY;
  const totalPlayers = Object.values(D).reduce((s,d) => s + (d.au || 0), 0);
  
  function statPill(label, cur, prev, fmtFn) {
    const valStr = cur !== null ? fmtFn(cur) : "—";
    const delta = (cur !== null && prev !== null && prev !== 0) ? ((cur - prev) / Math.abs(prev) * 100) : null;
    const dStr = delta !== null ? `${delta >= 0 ? "+" : ""}${delta.toFixed(0)}%` : "";
    const dC = delta !== null ? (delta >= 0 ? "#16a34a" : "#dc2626") : "#999";
    return `<div style="flex:1;text-align:center"><div style="font-size:10px;color:#999;margin-bottom:2px">${label}</div><div class="mono" style="font-size:14px;font-weight:700;color:#222">${valStr}</div>${dStr?`<div class="mono" style="font-size:9px;color:${dC}">${dStr}</div>`:""}</div>`;
  }
  
  const depCur = ph.deposits?.length ? ph.deposits[ph.deposits.length-1] : null;
  const depPrev = ph.deposits?.length >= 2 ? ph.deposits[ph.deposits.length-2] : null;
  const mrgCur = ph.margin_pct?.length ? ph.margin_pct[ph.margin_pct.length-1] : null;
  const mrgPrev = ph.margin_pct?.length >= 2 ? ph.margin_pct[ph.margin_pct.length-2] : null;
  
  let h = `<div style="background:#fff;border-radius:12px;border:1px solid #e0e2ea;padding:14px 12px;margin-bottom:12px">`;
  // NGR header
  h += `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span style="color:#333;font-size:13px;font-weight:600">NGR платформа</span><span class="mono" style="color:${lastC};font-size:18px;font-weight:700">${fmtNGR(lastV)}</span></div>`;
  // Chart
  h += svg;
  h += `<div style="display:flex;justify-content:space-between;padding:0 36px 0 36px;margin-bottom:14px">${labels}</div>`;
  // Stats row
  h += `<div style="display:flex;gap:1px;border-top:1px solid #e0e2ea;padding-top:10px">`;
  h += statPill("Депозиты", depCur, depPrev, v => fmtNGR(v));
  h += `<div style="width:1px;background:#e0e2ea"></div>`;
  h += statPill("Маржа", mrgCur, mrgPrev, v => v.toFixed(1)+"%");
  h += `<div style="width:1px;background:#e0e2ea"></div>`;
  h += statPill("Игроки", totalPlayers, null, v => fmt(v));
  h += `</div></div>`;
  return h;
}

// ═══ 5c. SIGNALS GENERATOR ═══
const SIGNAL_ACTIONS = {
  flag: "→ Связаться с платёжным провайдером",
  score_low: "→ Приоритет: худший блок этого GEO",
  ngr_drop: "→ Проверить платёжки, трафик, VIP-активность",
  ngr_growth: "",
  metric_zero: {
    dep_approval:"→ Проверить платёжного провайдера",wd_approval:"→ Проверить процессинг выводов",
    cashout_pct:"→ Аномальный cashout, проверить whale-активность",
    d30_retention:"→ Проверить onboarding и D1-D7 бонусы",d90_retention:"→ Проверить retention-кампании",
    core_retention:"→ Проверить reactivation pipeline",active_mom:"→ Проверить acquisition volume",
    csat:"→ Аудит качества Support",frt_sec:"→ Проверить нагрузку Support",
    sport_margin:"→ Проверить результаты матчей / VIP-ставки",
    casino_margin:"→ Проверить RTP и whale-активность",
    ngr_mom:"→ Декомпозиция: трафик vs ARPPU vs cashout",
  },
  support_bad: "→ Аудит SUP: FRT, CSAT, нагрузка агентов",
  vip_shift: "→ Проверить whale-активность и транзитные аккаунты",
};
function getSignalAction(type, mk) {
  if (type === "metric_zero" && SIGNAL_ACTIONS.metric_zero[mk]) return ` ${SIGNAL_ACTIONS.metric_zero[mk]}`;
  if (SIGNAL_ACTIONS[type]) return ` ${SIGNAL_ACTIONS[type]}`;
  return "";
}

function generateSignals(geos) {
  const signals = [];
  const platNgr = PLAT_TREND;
  if (platNgr.length >= 2) {
    const cur = platNgr[platNgr.length-1], prev = platNgr[platNgr.length-2];
    const pct = (cur - prev) / Math.max(Math.abs(prev), 1) * 100;
    if (pct < -15) signals.push({type:"critical",icon:"🔴",text:`Platform NGR ${pct.toFixed(0)}% MoM (${fmtNGR(cur)} ← ${fmtNGR(prev)})${getSignalAction("ngr_drop")}`,geo:null,priority:100});
  }

  geos.forEach(({g,s,d,flag}) => {
    if (flag) {
      const fl = FLAGS[g];
      signals.push({type:"critical",icon:"🔴",text:`${g}: ${fl?fl.msg:"ПС отключены"} — NGR ${fmtNGR(d.ngr)}${getSignalAction("flag")}`,geo:g,priority:95});
    }
    if (!NO(s) && s < 40 && !flag) {
      const worstCat = Object.entries(CATS).map(([ck,ct])=>({ck,s:catSc(d,ck),l:ct.l,i:ct.i})).filter(x=>x.s!==null).sort((a,b)=>a.s-b.s)[0];
      const worstHint = worstCat ? ` → Приоритет: ${worstCat.i} ${worstCat.l} (${Math.round(worstCat.s)}pt)` : getSignalAction("score_low");
      signals.push({type:"critical",icon:"🔴",text:`${g} Score ${Math.round(s)}pt — проблемная зона${worstHint}`,geo:g,priority:80});
    }
    if (!NO(d.ngr_mom)) {
      if (d.ngr_mom < -30) {
        const curNgr = d.ngr, prevNgr = PREV[g]?.ngr;
        signals.push({type:"critical",icon:"🔴",text:`${g} NGR ${d.ngr_mom>0?"+":""}${d.ngr_mom.toFixed(0)}% MoM (${fmtNGR(curNgr)}${prevNgr?" ← "+fmtNGR(prevNgr):""})${getSignalAction("ngr_drop")}`,geo:g,priority:85});
      } else if (d.ngr_mom > 30) {
        signals.push({type:"growth",icon:"🟢",text:`${g} NGR +${d.ngr_mom.toFixed(0)}% MoM (${fmtNGR(d.ngr)})`,geo:g,priority:50});
      }
    }
    ALL_METRICS.forEach(mk => {
      const sc = scr(mk, d[mk]);
      if (sc !== null && sc === 0) {
        signals.push({type:"critical",icon:"🔴",text:`${g}: ${DEF_TH[mk].l} = ${fmt(d[mk])}${DEF_TH[mk].u} (score 0)${getSignalAction("metric_zero",mk)}`,geo:g,priority:70});
      }
    });
  });

  let worstSupport = null, worstCSAT = 999, worstFRT = 0;
  geos.forEach(({g,d}) => {
    if (!NO(d.csat) && d.csat < worstCSAT) { worstCSAT = d.csat; worstSupport = g; }
    if (!NO(d.frt_sec) && d.frt_sec > worstFRT) { worstFRT = d.frt_sec; }
  });
  if (worstSupport && worstCSAT < 55) {
    const wd = D[worstSupport];
    signals.push({type:"warning",icon:"🟡",text:`${worstSupport} Support: FRT ${fmt(wd.frt_sec)}с, CSAT ${fmt(wd.csat)}%${getSignalAction("support_bad")}`,geo:worstSupport,priority:60});
  }

  const segKeys = Object.keys(SEGMENTS).sort();
  if (segKeys.length >= 2) {
    const prev = SEGMENTS[segKeys[segKeys.length-2]];
    const cur = SEGMENTS[segKeys[segKeys.length-1]];
    if (prev && cur && prev["Вип++"] && cur["Вип++"]) {
      const pNgr = prev["Вип++"].ngr, cNgr = cur["Вип++"].ngr;
      const delta = cNgr - pNgr;
      if (Math.abs(delta) > 5000) {
        const ic = delta < 0 ? "🔴" : "🟢";
        const tp = delta < 0 ? "critical" : "growth";
        signals.push({type:tp,icon:ic,text:`VIP++ NGR ${fmtNGR(cNgr)} (было ${fmtNGR(pNgr)}, Δ${delta>0?"+":""}${fmtNGR(delta)})${delta<0?getSignalAction("vip_shift"):""}`,geo:null,priority:75});
      }
    }
  }

  signals.sort((a,b) => b.priority - a.priority);
  const seen = new Set();
  return signals.filter(s => {
    const key = s.text.substring(0,40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  }).slice(0, 6);
}

function execSummaryHTML(geos, ps) {
  const totalNGR = Object.values(D).reduce((s,d) => s + (d.ngr||0), 0);
  const prevNGR = PLAT_TREND.length >= 2 ? PLAT_TREND[PLAT_TREND.length-2] : null;
  const ngrDelta = prevNGR ? ((totalNGR - prevNGR) / Math.abs(prevNGR) * 100) : null;
  const flagged = geos.filter(g => g.flag).length;
  const scoreCrit = geos.filter(g => !NO(g.s) && g.s < 40 && !g.flag).length;
  const crit = scoreCrit + flagged;
  const green = geos.filter(g => !NO(g.s) && g.s >= 70 && !g.flag).length;
  const yellow = geos.length - green - crit;
  const sorted = [...geos].filter(g => !NO(g.d.ngr)).sort((a,b) => (b.d.ngr||0) - (a.d.ngr||0));
  const top2 = sorted.slice(0,2);
  const top2pct = totalNGR > 0 ? ((top2[0]?.d.ngr||0) + (top2[1]?.d.ngr||0)) / totalNGR * 100 : 0;
  const totalAU = Object.values(D).reduce((s,d) => s + (d.au||0), 0);
  const totalFTD = Object.values(D).reduce((s,d) => s + (d.ftd_count||0), 0);
  const ph = PLAT_HISTORY;
  const marginPct = ph.margin_pct && ph.margin_pct.length ? ph.margin_pct[ph.margin_pct.length-1] : null;

  let lines = [];
  const ngrStr = ngrDelta !== null ? `${ngrDelta > 0 ? "+" : ""}${ngrDelta.toFixed(0)}%` : "";
  lines.push(`Платформа <span style="color:#222;font-weight:700">${fmtNGR(totalNGR)}</span> NGR${ngrStr ? ` (${ngrDelta>0?"📈":"📉"} ${ngrStr} MoM)` : ""}${!NO(marginPct)?`, маржа <span style="color:${marginPct<15?"#dc2626":marginPct<25?"#d97706":"#16a34a"};font-weight:600">${marginPct.toFixed(0)}%</span>`:""}, score <span style="color:${cl(ps).tx};font-weight:700">${NO(ps)?"—":Math.round(ps)}pt</span>. AU ${fmt(totalAU)}, FTD ${fmt(totalFTD)}.`);

  if (crit > 0) {
    let parts = [];
    if (green > 0) parts.push(`<span style="color:#16a34a">${green} в норме</span>`);
    if (yellow > 0) parts.push(`<span style="color:#d97706">${yellow} внимание</span>`);
    parts.push(`<span style="color:#dc2626">${crit} проблемных</span>${flagged?` (вкл. ${flagged} с флагом)`:""}`);
    lines.push(parts.join(", ") + ".");
  } else if (yellow > 0) {
    lines.push(`<span style="color:#16a34a">${green} в норме</span>, <span style="color:#d97706">${yellow} требуют внимания</span>.`);
  } else {
    lines.push(`<span style="color:#16a34a">Все ${geos.length} GEO в норме.</span>`);
  }

  // Diagnostic: worst category across platform
  const worstCat = Object.entries(CATS).map(([ck,ct]) => {
    const vals = geos.map(g => catSc(g.d, ck)).filter(x => x !== null);
    return {ck, l:ct.l, i:ct.i, s: vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null};
  }).filter(x => x.s !== null).sort((a,b) => a.s - b.s)[0];
  if (worstCat && worstCat.s < 50) lines.push(`Слабый блок: ${worstCat.i} ${worstCat.l} <span style="color:${cl(worstCat.s).tx}">${Math.round(worstCat.s)}pt</span>.`);

  if (top2pct > 60) lines.push(`⚠️ Концентрация: ${top2[0]?.g.split(" ").pop()} + ${top2[1]?.g.split(" ").pop()} = <span style="color:#d97706">${top2pct.toFixed(0)}%</span> NGR.`);

  return `<div style="background:#ffffff;border-radius:10px;border:1px solid #e0e2ea;padding:10px 12px;margin-bottom:10px"><div style="color:#444;font-size:11px;line-height:1.6">${lines.join(" ")}</div></div>`;
}

function ngrContribHTML(geos) {
  const sorted = [...geos].filter(g => g.d.ngr > 0).sort((a,b) => (b.d.ngr||0) - (a.d.ngr||0));
  const total = sorted.reduce((s,g) => s + (g.d.ngr||0), 0);
  if (!total) return "";
  let h = `<div style="margin-bottom:10px"><div class="mono" style="color:#777;font-size:9px;margin-bottom:4px">NGR вклад по GEO</div><div style="display:flex;border-radius:6px;overflow:hidden;height:18px">`;
  const colors = ["#7c83ff","#16a34a","#d97706","#ff6b35","#e040fb","#00bcd4","#8bc34a","#ff5722","#9c27b0","#607d8b"];
  sorted.forEach((g, i) => {
    const pct = (g.d.ngr / total * 100);

    h += `<div onclick="nav('${g.g}')" style="width:${pct}%;background:${colors[i%colors.length]};cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden" title="${g.g}: ${fmtNGR(g.d.ngr)} (${pct.toFixed(0)}%)"><span class="mono" style="color:#fff;font-size:7px;font-weight:600;text-shadow:0 0 3px #000">${pct>=8?g.g.split(" ").pop():""}</span></div>`;
  });
  h += `</div><div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">`;
  sorted.forEach((g, i) => {
    const pct = (g.d.ngr / total * 100);
    h += `<span style="display:inline-flex;align-items:center;gap:2px;font-size:8px;color:#888"><span style="width:6px;height:6px;border-radius:2px;background:${colors[i%colors.length]}"></span>${g.g.split(" ").pop()} ${pct.toFixed(0)}%</span>`;
  });
  h += `</div></div>`;
  return h;
}

// ═══ 5h. HEATMAP MATRIX GEO × CATEGORY ═══
function heatmapHTML(geos) {
  const catKeys = Object.keys(CATS);
  let h = `<div style="margin-bottom:14px;background:#ffffff;border-radius:12px;border:1px solid #e0e2ea;padding:10px;overflow-x:auto"><div class="mono" style="color:#666;font-size:9px;font-weight:600;margin-bottom:8px;text-align:center">📋 МАТРИЦА GEO × БЛОКИ</div>`;
  h += `<table style="width:100%;border-collapse:collapse;font-size:9px"><thead><tr><th style="text-align:left;padding:3px 4px;color:#777;font-weight:600;min-width:60px">GEO</th>`;
  catKeys.forEach(ck => { h += `<th style="text-align:center;padding:3px 2px;color:#777;font-weight:500;min-width:28px" title="${CATS[ck].l} (${CATS[ck].w}%)">${CATS[ck].i}</th>`; });
  h += `<th style="text-align:center;padding:3px 4px;color:#888;font-weight:600;min-width:30px">Σ</th></tr></thead><tbody>`;
  const sortedGeos = [...geos].sort((a,b) => (b.s??-1) - (a.s??-1));
  sortedGeos.forEach(({g,s,d,flag}) => {
    h += `<tr onclick="nav('${g}')" style="cursor:pointer" onmouseenter="this.style.background='#f0f1f5'" onmouseleave="this.style.background='transparent'">`;
    h += `<td style="padding:3px 4px;color:#666;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px">${flag?"⛔ ":""}${g.split(" ").pop()}</td>`;
    catKeys.forEach(ck => {
      const cs = catSc(d, ck);
      const cc = cl(cs);
      const cellBg = NO(cs) ? "transparent" : `${cc.gw}${cs>=70?"0d":cs>=40?"12":"33"}`;
      h += `<td style="text-align:center;padding:3px 2px"><span class="mono" style="color:${NO(cs)?"#222":cc.tx};font-size:9px;font-weight:600;background:${cellBg};padding:1px 3px;border-radius:3px;display:inline-block;min-width:22px">${NO(cs)?"·":Math.round(cs)}</span></td>`;

// ═══ 5d. SEGMENTS SECTION ═══
function segmentsHTML() {
  const segKeys = Object.keys(SEGMENTS).sort();
  if (segKeys.length < 1) return "";
  const hasPrev = segKeys.length >= 2;
  const curKey = segKeys[segKeys.length-1];
  const prevKey = hasPrev ? segKeys[segKeys.length-2] : null;
  const curSeg = SEGMENTS[curKey];
  const prevSeg = hasPrev ? SEGMENTS[prevKey] : null;
  if (!curSeg) return "";

  const segNames = Object.keys(curSeg);
  let h = `<div style="margin-top:14px;background:#f8f9fc;border-radius:12px;border:1px solid #e0e2ea;padding:12px 10px"><div class="mono" style="color:#666;font-size:9px;font-weight:600;margin-bottom:8px;text-align:center">📊 СЕГМЕНТЫ · ${prevKey||""} → ${curKey}</div>`;
  segNames.forEach(name => {
    const c = curSeg[name];
    const p = prevSeg ? prevSeg[name] : null;
    const ngrDelta = p ? c.ngr - p.ngr : null;
    const ngrPct = p && p.ngr !== 0 ? ((c.ngr - p.ngr) / Math.abs(p.ngr) * 100) : null;
    const deltaColor = c.ngr < 0 ? "#dc2626" : (ngrDelta !== null && ngrDelta < 0 ? "#dc2626" : "#16a34a");
    const icon = c.ngr < 0 ? "🔴" : (ngrPct !== null && ngrPct < -20 ? "🔴" : ngrPct !== null && ngrPct > 20 ? "🟢" : "⚪");
    h += `<div class="seg-row" style="background:#f0f1f5"><span style="font-size:10px;color:#444;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span><span class="mono" style="color:#888;font-size:9px;min-width:36px;text-align:center">${c.players}p</span><span class="mono" style="color:${deltaColor};font-size:10px;font-weight:600;min-width:55px;text-align:right">${fmtNGR(c.ngr)}</span>${ngrPct!==null?`<span class="mono" style="color:${ngrPct>=0?"#16a34a88":"#dc262688"};font-size:8px;min-width:36px;text-align:right">${ngrPct>=0?"+":""}${ngrPct.toFixed(0)}%</span>`:`<span style="min-width:36px"></span>`}<span style="font-size:10px;min-width:16px;text-align:center">${icon}</span></div>`;
  });
  h += `</div>`;
  return h;
}

// ═══ 5f. RETENTION TABLE ═══
function retentionTableHTML() {
  const GC = GEO_COHORTS;
  if (!GC || !Object.keys(GC).length) return "";
  
  function retCell(v) {
    if (NO(v)) return `<td style="text-align:center;padding:2px 3px;color:#ddd;font-size:10px">·</td>`;
    const c = v >= 20 ? "#0a8a4a" : v >= 10 ? "#16a34a" : v >= 5 ? "#b45309" : "#dc2626";
    return `<td style="text-align:center;padding:2px 3px"><span class="mono" style="color:${c};font-size:10px;font-weight:600">${v.toFixed(1)}</span></td>`;
  }
  
  // Find the latest cohort that has M1 data across most GEOs
  const geoOrder = Object.keys(GC).sort((a,b) => ((D[b]||{}).ngr||0) - ((D[a]||{}).ngr||0));
  
  // Determine which cohort to show (latest with M1 for majority)
  const moMap = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  function cohortSortKey(name) {
    const parts = name.split(" ");
    if (parts.length === 2) { const mo = moMap[parts[0]]||0; const yr = parseInt(parts[1])||0; return yr*100+mo; }
    return 0;
  }
  let cohortCounts = {};
  geoOrder.forEach(geo => {
    (GC[geo]||[]).forEach(c => { if (c.m1 !== null) cohortCounts[c.cohort] = (cohortCounts[c.cohort]||0) + 1; });
  });
  const sortedCohorts = Object.entries(cohortCounts).sort((a,b) => cohortSortKey(b[0]) - cohortSortKey(a[0]));
  const latestCohort = sortedCohorts.length ? sortedCohorts[0][0] : "";
  
  let h = `<div style="margin-top:14px;background:#fff;border-radius:12px;border:1px solid #e0e2ea;padding:14px 12px">`;
  h += `<div class="mono" style="color:#555;font-size:11px;font-weight:600;margin-bottom:4px;text-align:center">🔄 RETENTION ПО GEO</div>`;
  h += `<div class="mono" style="color:#999;font-size:10px;margin-bottom:12px;text-align:center">M1 retention когорты <span style="color:#7c83ff;font-weight:600">${latestCohort}</span> · % вернувшихся через 30 дней</div>`;
  
  // Summary table: GEO | cohort size | M1%
  h += `<table style="width:100%;border-collapse:collapse">`;
  h += `<thead><tr><th style="text-align:left;padding:6px;font-size:11px;color:#555;font-weight:600;border-bottom:2px solid #e0e2ea">GEO</th>`;
  h += `<th style="text-align:center;padding:6px;font-size:10px;color:#888;border-bottom:2px solid #e0e2ea">Новых</th>`;
  h += `<th style="text-align:center;padding:6px;font-size:11px;color:#333;font-weight:600;border-bottom:2px solid #e0e2ea">M1 Retention</th>`;
  h += `<th style="text-align:center;padding:6px;font-size:10px;color:#888;border-bottom:2px solid #e0e2ea">пред. когорта</th>`;
  h += `<th style="width:20px;border-bottom:2px solid #e0e2ea"></th>`;
  h += `</tr></thead><tbody>`;
  
  geoOrder.forEach(geo => {
    const cohorts = GC[geo] || [];
    const geoShort = geo.split(" ").pop();
    const geoId = geoShort.replace(/[^a-zA-Z]/g,"");
    
    // Find latest cohort data and previous
    const m1c = cohorts.filter(c => c.m1 !== null);
    const latest = m1c.length ? m1c[m1c.length-1] : null;
    const prev = m1c.length >= 2 ? m1c[m1c.length-2] : null;
    
    if (!latest) return;
    
    const smallSample = latest.size < 100;
    const m1Color = smallSample ? "#999" : (latest.m1 >= 20 ? "#0a8a4a" : latest.m1 >= 10 ? "#16a34a" : latest.m1 >= 5 ? "#b45309" : "#dc2626");
    const delta = prev ? (latest.m1 - prev.m1) : null;
    const deltaStr = delta !== null ? `${delta >= 0 ? "+" : ""}${delta.toFixed(1)}` : "";
    const deltaColor = delta !== null ? (delta >= 0 ? "#0a8a4a" : "#dc2626") : "#999";
    const sizeColor = smallSample ? "#dc2626" : "#666";
    const sizeNote = smallSample ? ` ⚠` : "";
    
    h += `<tr onclick="document.getElementById('ret-${geoId}').style.display=document.getElementById('ret-${geoId}').style.display==='none'?'block':'none'" style="cursor:pointer;border-bottom:1px solid #f0f1f5;${smallSample?"opacity:0.6":""}" onmouseenter="this.style.background='#f4f5f8'" onmouseleave="this.style.background=''" ${smallSample?`title="Малая выборка (n=${latest.size}): данные ненадёжны"`:""}>`;
    h += `<td style="padding:7px 6px;font-size:13px;color:#222;font-weight:500">${geo}</td>`;
    h += `<td style="text-align:center;padding:7px 4px;font-size:12px;color:${sizeColor}">${latest.size.toLocaleString()}${sizeNote}</td>`;
    h += `<td style="text-align:center;padding:7px 4px"><span class="mono" style="color:${m1Color};font-size:15px;font-weight:700">${latest.m1.toFixed(1)}%</span></td>`;
    h += `<td style="text-align:center;padding:7px 4px"><span class="mono" style="color:#bbb;font-size:11px">${prev ? prev.m1.toFixed(1)+"%" : "—"}</span>${deltaStr ? `<span class="mono" style="color:${smallSample?"#999":deltaColor};font-size:9px;margin-left:2px">${deltaStr}</span>` : ""}</td>`;
    h += `<td style="text-align:center;padding:4px"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"><path d="M3 4.5l3 3 3-3"/></svg></td>`;
    h += `</tr>`;
    
    // Expandable cohort history
    h += `<tr><td colspan="5" style="padding:0"><div id="ret-${geoId}" style="display:none;padding:4px 8px 10px">`;
    h += `<table style="width:100%;border-collapse:collapse"><thead><tr>`;
    h += `<th style="text-align:left;padding:2px 4px;font-size:9px;color:#999">Когорта</th>`;
    h += `<th style="text-align:center;padding:2px 3px;font-size:9px;color:#999">N</th>`;
    ['M1','M2','M3','M4','M5','M6'].forEach(m => {
      h += `<th style="text-align:center;padding:2px 3px;font-size:9px;color:#555;font-weight:600">${m}</th>`;
    });
    h += `</tr></thead><tbody>`;
    cohorts.forEach((c, i) => {
      const isRecent = i >= cohorts.length - 3;
      h += `<tr style="border-bottom:1px solid #f8f8fa"><td style="padding:2px 4px;font-size:10px;color:${isRecent?"#333":"#777"};font-weight:${isRecent?500:400};white-space:nowrap">${c.cohort}</td><td style="text-align:center;padding:2px 3px;font-size:9px;color:#aaa">${c.size}</td>`;
      h += retCell(c.m1) + retCell(c.m2) + retCell(c.m3) + retCell(c.m4) + retCell(c.m5) + retCell(c.m6);
      h += `</tr>`;
    });
    h += `</tbody></table></div></td></tr>`;
  });
  
  h += `</tbody></table>`;
  h += `<div class="mono" style="color:#bbb;font-size:8px;text-align:center;margin-top:8px">⚠ = малая выборка (&lt;100 чел.), данные ненадёжны · ⌄ раскрыть когорты · MGM.io</div>`;
  h += `</div>`;
  return h;
}

// ═══ 5h. GEO METRIC BLOCKS (same 8 as platform) ═══
function geoMetricGroupsHTML(geo, d, prev, hist) {
  const h8 = hist || {};
  const MD = MARGIN_DYN;
  const geoShort = geo.replace(/^[^\s]+\s/,"");
  const mdKey = Object.keys(MD.margin_pct||{}).find(k => geoShort.includes(k) || k.includes(geoShort));
  const marginHist = mdKey ? MD.margin_pct[mdKey] : (h8.margin_pct||null);
  const cashoutHist = mdKey ? (MD.cashout_pct||{})[mdKey] : (h8.cashout_pct||null);
  
  function metricRow(label, val, prevVal, unit, dir, histData, mk) {
    const s = mk ? scr(mk, val) : null;
    const mc = cl(s);
    const hasPrev = !NO(prevVal);
    const delta = hasPrev && !NO(val) ? val - prevVal : null;
    const arrow = delta !== null ? (dir==="h"?(delta>0?"↑":delta<0?"↓":"→"):(delta<0?"↑":delta>0?"↓":"→")) : "";
    const arrowC = delta !== null ? (dir==="h"?(delta>0?"#16a34a":"#dc2626"):(delta<0?"#16a34a":"#dc2626")) : "";
    let miniSpark = "";
    if (histData && histData.length >= 3) {
      const mx = Math.max(...histData.map(v=>Math.abs(v||0)));
      miniSpark = `<div style="display:flex;align-items:flex-end;gap:1px;height:14px;width:48px">`;
      histData.forEach((v,i) => { const bh = mx?Math.max(2,Math.abs(v||0)/mx*100):2; const neg=v<0;
        miniSpark += `<div style="flex:1;height:${bh}%;background:${i===histData.length-1?(neg?"#dc2626":"#16a34a"):(neg?"#dc262644":"#16a34a33")};border-radius:1px"></div>`;
      }); miniSpark += `</div>`;
    }
    if (NO(val)) return `<div style="display:flex;align-items:center;padding:3px 0;border-bottom:1px solid #f8f8fa"><span style="font-size:11px;color:#ccc;flex:1">${label}</span><span class="mono" style="color:#ddd">—</span></div>`;
    let r = `<div style="display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid #f8f8fa">`;
    r += `<span style="font-size:11px;color:#555;min-width:85px">${label}</span>`;
    if (miniSpark) r += miniSpark;
    r += `<div style="flex:1"></div>`;
    r += `<span class="mono" style="color:${mc.tx};font-size:13px;font-weight:600">${typeof val==="number"?(Number.isInteger(val)?val:val.toFixed(1)):val}${unit}</span>`;
    if (arrow) r += `<span style="color:${arrowC};font-size:10px;margin:0 1px">${arrow}</span>`;
    if (hasPrev) r += `<span class="mono" style="color:#bbb;font-size:9px">${typeof prevVal==="number"?(Number.isInteger(prevVal)?prevVal:prevVal.toFixed(1)):prevVal}${unit}</span>`;
    r += `</div>`;
    return r;
  }

  // History data mapping for metrics
  const histMap = { ngr: h8.ngr, margin_pct: marginHist, cashout_pct: cashoutHist };

  let html = `<div style="margin-bottom:14px">`;
  
  Object.entries(CATS).forEach(([ck, ct]) => {
    const cs = catSc(d, ck);
    const c = cl(cs);
    const score = NO(cs) ? "?" : Math.round(cs);
    const barW = Math.max(3, score === "?" ? 0 : score);
    const catId = `geo-cat-${ck}`;
    
    
    html += `<div style="margin-bottom:4px;background:#fff;border-radius:10px;border:1px solid #e0e2ea;overflow:hidden">`;
    html += `<div onclick="document.getElementById('${catId}').style.display=document.getElementById('${catId}').style.display==='none'?'block':'none'" style="display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer" onmouseenter="this.style.background='#f4f5f8'" onmouseleave="this.style.background=''">`;
    html += `<span style="font-size:12px;color:#333;font-weight:500;min-width:110px">${ct.l}</span>${blockInfoHTML(ck)}`;
    html += `<div style="flex:1;height:22px;background:#f0f1f5;border-radius:4px;position:relative;overflow:hidden"><div style="height:100%;width:${barW}%;background:${c.gw};border-radius:4px;opacity:0.85"></div>`;
    if (score !== "?" && score >= 20) html += `<span class="mono" style="position:absolute;left:6px;top:3px;font-size:11px;font-weight:700;color:#fff">${score}</span>`;
    html += `</div>`;
    if (score === "?" || score < 20) html += `<span class="mono" style="color:${c.tx};font-size:13px;font-weight:700;min-width:20px;text-align:right">${score}</span>`;
    html += `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><path d="M3 4.5l3 3 3-3"/></svg>`;
    html += `</div><div id="${catId}" style="display:none;padding:4px 12px 10px;border-top:1px solid #f0f1f5">`;
    
    ct.m.forEach(mk => {
      const t = getTH(mk);
      html += metricRow(t.l, d[mk], prev?.[mk], t.u||"", t.d, histMap[mk]||null, mk);
    });
    
    // Special: cohort table in retention block
    if (ck === "retention") {
      const gc = GEO_COHORTS[geo];
      if (gc && gc.length) {
        html += `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #e0e2ea"><div class="mono" style="color:#999;font-size:9px;margin-bottom:3px">Когорты (M1-M6)</div>`;
        html += `<table style="width:100%;border-collapse:collapse;font-size:9px"><thead><tr><th style="text-align:left;padding:2px;color:#999"></th><th style="text-align:center;padding:2px;color:#666">N</th>`;
        ['M1','M2','M3','M4','M5','M6'].forEach(m => { html += `<th style="text-align:center;padding:2px;color:#666">${m}</th>`; });
        html += `</tr></thead><tbody>`;
        gc.slice(-5).forEach((co,i) => {
          const isLast = i === Math.min(gc.length,5)-1;
          html += `<tr><td style="padding:1px 2px;color:${isLast?"#333":"#999"};font-weight:${isLast?500:400}">${co.cohort}</td><td style="text-align:center;padding:1px;color:#bbb">${co.size}</td>`;
          ['m1','m2','m3','m4','m5','m6'].forEach(mk2 => {
            const v = co[mk2];
            if (NO(v)) html += `<td style="text-align:center;padding:1px;color:#ddd">·</td>`;
            else { const cc = v>=15?"#0a8a4a":v>=5?"#b45309":"#dc2626"; html += `<td style="text-align:center;padding:1px"><span class="mono" style="color:${cc};font-weight:${isLast?600:400}">${v.toFixed(1)}</span></td>`; }
          });
          html += `</tr>`;
        });
        html += `</tbody></table></div>`;
      }
    }
    
    html += `</div></div>`;
  });
  
  html += `</div>`;
  return html;
}

function marginHeatmapHTML() {
  const M = MARGIN_DYN;
  if (!M.months || !M.margin_pct) return "";
  const months = M.months;
  const mp = M.margin_pct;
  const geoMap = {'Brazil':'🇧🇷','Argentina':'🇦🇷','Chile':'🇨🇱','Mexico':'🇲🇽','Peru':'🇵🇪','Colombia':'🇨🇴','India':'🇮🇳','Bangladesh':'🇧🇩','Poland':'🇵🇱','Portugal':'🇵🇹'};
  
  function mrgC(v) {
    if (v === null || v === undefined) return {c:"#999",bg:"transparent"};
    if (v < 0) return {c:"#dc2626",bg:"#fecaca33"};
    if (v < 10) return {c:"#dc2626",bg:"#fecaca22"};
    if (v < 20) return {c:"#b45309",bg:"#fef3c711"};
    if (v < 30) return {c:"#16a34a",bg:"transparent"};
    return {c:"#0a8a4a",bg:"#dcfce711"};
  }
  
  let h = `<div style="margin-top:14px;background:#fff;border-radius:12px;border:1px solid #e0e2ea;padding:14px 12px"><div class="mono" style="color:#555;font-size:11px;font-weight:600;margin-bottom:10px;text-align:center">📊 МАРЖА % ПО GEO</div>`;

  h += `<th style="text-align:left;padding:3px 6px;font-size:10px;color:#999;border-bottom:2px solid #e0e2ea">GEO</th>`;
  months.forEach((m,i) => {
    const isLast = i === months.length-1;
    h += `<th style="text-align:center;padding:3px 4px;font-size:9px;color:${isLast?"#333":"#999"};font-weight:${isLast?700:400};border-bottom:2px solid #e0e2ea">${m}</th>`;
  });
  h += `</tr></thead><tbody>`;
  
  // Platform first
  if (mp.Platform) {
    h += `<tr style="border-bottom:2px solid #e0e2ea;background:#f8f9fc"><td style="padding:4px 6px;font-size:11px;color:#333;font-weight:600">Платформа</td>`;
    mp.Platform.forEach((v,i) => {
      const {c,bg} = mrgC(v);
      h += `<td style="text-align:center;padding:3px 4px;background:${bg}"><span class="mono" style="color:${c};font-size:11px;font-weight:600">${v!==null?v.toFixed(1):"—"}</span></td>`;
    });
    h += `</tr>`;
  }
  
  // GEOs sorted by NGR
  const geoOrder = Object.keys(mp).filter(g=>g!=='Platform').sort((a,b) => {
    const ga = '🇧🇷 '+a, gb = '🇧🇷 '+b;
    return ((D[Object.keys(D).find(k=>k.includes(b))]||{}).ngr||0) - ((D[Object.keys(D).find(k=>k.includes(a))]||{}).ngr||0);
  });
  
  geoOrder.forEach(geo => {
    const data = mp[geo];
    if (!data) return;
    const flag = geoMap[geo]||"";
    h += `<tr style="border-bottom:1px solid #f4f5f8"><td style="padding:3px 6px;font-size:11px;color:#444">${flag} ${geo}</td>`;
    data.forEach((v,i) => {
      const {c,bg} = mrgC(v);
      h += `<td style="text-align:center;padding:3px 4px;background:${bg}"><span class="mono" style="color:${c};font-size:10px">${v!==null?v.toFixed(1):"—"}</span></td>`;
    });
    h += `</tr>`;
  });
  
  h += `</tbody></table></div>`;
  h += `<div class="mono" style="color:#bbb;font-size:8px;text-align:center;margin-top:6px">NGR/Deposits · норма 20-30% · красный &lt;10% · источник: margin_dynamics</div></div>`;
  return h;
}

// ═══ 5g-2. DEPOSIT CONVERSION FUNNEL ═══
function funnelHTML() {
  let F = {};
  try { F = typeof FUNNEL !== "undefined" ? FUNNEL : {}; } catch(e) {}
  if (!F.periods || !F.periods.length) return "";
  const p = F.periods;
  const li = p.length - 1;
  const reg = F.registration?.[li], ftd = F.ftd?.[li];
  const r2d = F.reg2dep_pct?.[li], cr2 = F.cr2_pct?.[li];
  const cr3 = F.cr3_pct?.[li], cr5 = F.cr5_pct?.[li];
  if (!reg) return "";

  let h = `<div style="margin-top:14px;background:#fff;border-radius:12px;border:1px solid #e0e2ea;padding:14px 12px"><div class="mono" style="color:#555;font-size:11px;font-weight:600;margin-bottom:14px;text-align:center">📥 ВОРОНКА · ${p[li]}</div>`;

  const stages = [
    {id:"fn-reg",label:"Регистрации",val:fmt(reg),w:100,sub:"Новые пользователи на платформе",data:F.registration,fmtFn:v=>fmt(v)},
    {id:"fn-ftd",label:"FTD",val:fmt(ftd),w:ftd/reg*100,sub:`${(ftd/reg*100).toFixed(0)}% от регистраций сделали первый депозит`,data:F.ftd,fmtFn:v=>fmt(v),conv:`${(ftd/reg*100).toFixed(0)}% рег.`},
    {id:"fn-cr2",label:"2+ деп",val:`${(cr2||0).toFixed(0)}%`,w:cr2||0,sub:"% от FTD, кто сделал повторный (2-й) депозит",data:F.cr2_pct,fmtFn:v=>v.toFixed(0)+"%",conv:"от FTD"},
    {id:"fn-cr3",label:"3+ деп",val:`${(cr3||0).toFixed(0)}%`,w:cr3||0,sub:"% от FTD с 3+ депозитами — формирование привычки",data:F.cr3_pct,fmtFn:v=>v.toFixed(0)+"%",conv:"от FTD"},
    {id:"fn-cr5",label:"5+ деп",val:`${(cr5||0).toFixed(0)}%`,w:cr5||0,sub:"% от FTD с 5+ депозитами — лояльное ядро",data:F.cr5_pct,fmtFn:v=>v.toFixed(0)+"%",conv:"от FTD"},
  ];

  stages.forEach((s, i) => {
    const barW = Math.max(8, s.w);
    const op = 1 - i * 0.12;
    const hasHist = s.data && s.data.length > 1;
    h += `<div style="margin-bottom:6px" title="${s.sub}">`;
    h += `<div style="display:flex;align-items:center;gap:6px;cursor:${hasHist?"pointer":"default"}" ${hasHist?`onclick="document.getElementById('${s.id}').style.display=document.getElementById('${s.id}').style.display==='none'?'block':'none'"`:""}>`;
    h += `<span style="font-size:11px;color:#555;min-width:72px">${s.label}</span>`;
    h += `<div style="flex:1;position:relative;height:26px"><div style="height:100%;width:${barW}%;background:#6366f1;opacity:${op};border-radius:4px"></div>`;
    h += `<span class="mono" style="position:absolute;left:${2}%;top:5px;font-size:12px;font-weight:700;color:${"#fff"}">${s.val}</span></div>`;
    if (s.conv) h += `<span class="mono" style="font-size:9px;color:#999;min-width:50px;text-align:right">${s.conv}</span>`;
    else h += `<span style="min-width:50px"></span>`;
    if (hasHist) h += `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><path d="M3 4.5l3 3 3-3"/></svg>`;
    h += `</div>`;
    // Expandable history
    if (hasHist) {
      h += `<div id="${s.id}" style="display:none;padding:4px 0 2px 78px"><div style="display:flex;gap:4px;align-items:flex-end;height:32px">`;
      const mx = Math.max(...s.data);
      s.data.forEach((v, j) => {
        const bh = Math.max(4, v/mx*100);
        const isLast = j === li;
        const prev = j > 0 ? s.data[j-1] : null;
        const delta = prev ? v - prev : null;
        const dC = delta !== null ? (delta >= 0 ? "#16a34a" : "#dc2626") : "#999";
        h += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">`;
        h += `<span class="mono" style="font-size:9px;color:${isLast?"#333":"#999"};font-weight:${isLast?600:400}">${s.fmtFn(v)}</span>`;
        h += `<div style="width:100%;height:${bh}%;background:${isLast?"#6366f1":"#6366f133"};border-radius:2px 2px 0 0;min-height:3px"></div>`;
        h += `<span class="mono" style="font-size:8px;color:${isLast?"#555":"#bbb"}">${p[j]}</span>`;
        h += `</div>`;
      });
      h += `</div></div>`;
    }
    h += `</div>`;
  });

  h += `<div class="mono" style="color:#bbb;font-size:8px;text-align:center;margin-top:8px">подсказка при наведении · ⌄ раскрыть историю · маркетинговый отчёт</div></div>`;
  return h;
}

function platBlocksHTML(geos) {
  let html = `<div style="margin-top:14px;background:#fff;border-radius:12px;border:1px solid #e0e2ea;padding:14px 12px"><div class="mono" style="color:#555;font-size:11px;font-weight:600;margin-bottom:12px;text-align:center">ПЛАТФОРМА · БЛОКИ</div>`;
  
  // Sort by weight desc
  const cats = Object.entries(CATS).sort((a,b) => b[1].w - a[1].w);
  
  cats.forEach(([ck, ct]) => {
    const vals = geos.map(g => catSc(g.d, ck)).filter(x => x !== null);
    const s = vals.length ? vals.reduce((a,b) => a+b, 0)/vals.length : null;
    const c = cl(s);
    const score = NO(s) ? 0 : Math.round(s);
    const barW = Math.max(3, score);
    
    html += `<div style="margin-bottom:4px">`;
    html += `<div onclick="toggleRanking('${ck}')" style="display:flex;align-items:center;gap:8px;padding:6px 4px;cursor:pointer;border-radius:6px" onmouseenter="this.style.background='#f4f5f8'" onmouseleave="this.style.background=''">`;
    // Label + weight
    html += `<span style="font-size:12px;color:#333;font-weight:500;min-width:110px">${ct.l}</span>${blockInfoHTML(ck)}`;
    // Bar
    html += `<div style="flex:1;height:22px;background:#f0f1f5;border-radius:4px;position:relative;overflow:hidden">`;
    html += `<div style="height:100%;width:${barW}%;background:${c.gw};border-radius:4px;opacity:0.85"></div>`;
    if (score >= 20) html += `<span class="mono" style="position:absolute;left:6px;top:3px;font-size:11px;font-weight:700;color:#fff">${score}</span>`;
    html += `</div>`;
    // Score (outside if bar too narrow)
    if (score < 20) html += `<span class="mono" style="color:${c.tx};font-size:14px;font-weight:700;min-width:24px;text-align:right">${NO(s)?"—":score}</span>`;
    // Weight
    html += `<span class="mono" style="color:#bbb;font-size:9px;min-width:20px;text-align:right">${ct.w}%</span>`;
    // Expand
    html += `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><path d="M3 4.5l3 3 3-3"/></svg>`;
    html += `</div>`;
    
    // Per-GEO ranking (expandable)
    html += `<div id="rank-${ck}" style="display:none;padding:4px 0 6px 24px">`;
    const ranked = geos.map(g => ({g:g.g, s:catSc(g.d, ck), d:g.d})).filter(r => r.s !== null).sort((a,b) => b.s - a.s);
    ranked.forEach((r, i) => {
      const rc = cl(r.s);
      const rs = Math.round(r.s);
      const rw = Math.max(3, rs);
      html += `<div onclick="nav('${r.g}')" style="display:flex;align-items:center;gap:6px;padding:3px 4px;cursor:pointer;border-radius:4px" onmouseenter="this.style.background='#f4f5f8'" onmouseleave="this.style.background=''">`;
      html += `<span class="mono" style="color:#bbb;font-size:9px;width:14px">${i+1}</span>`;
      html += `<span style="font-size:11px;color:#444;min-width:80px">${r.g.split(" ").pop()}</span>`;
      html += `<div style="flex:1;height:14px;background:#f0f1f5;border-radius:3px;overflow:hidden"><div style="height:100%;width:${rw}%;background:${rc.gw};opacity:0.7;border-radius:3px"></div></div>`;
      html += `<span class="mono" style="color:${rc.tx};font-weight:700;font-size:11px;min-width:20px;text-align:right">${rs}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  
  html += `<div class="mono" style="color:#bbb;font-size:8px;text-align:center;margin-top:6px">⌄ раскрыть рейтинг GEO · вес в общем score справа</div>`;
  return html + `</div>`;
}

  } else if (state.geo && state.cat) {

function textSparkline(data) {
  if (!data || data.length < 2) return "";
  const chars = "▁▂▃▄▅▆▇█";
  const mn = Math.min(...data), mx = Math.max(...data), range = mx - mn || 1;
  return data.map(v => chars[Math.min(7, Math.floor((v - mn) / range * 7.99))]).join("");
}

  "portugal":"🇵🇹 Portugal","португалия":"🇵🇹 Portugal","pt":"🇵🇹 Portugal",
};

function resolveGeo(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (D[s]) return s;
  const low = s.toLowerCase();
  if (GEO_ALIASES[low]) return GEO_ALIASES[low];
  for (const geo of Object.keys(D)) {
    if (geo.toLowerCase().includes(low) || low.includes(geo.split(" ").pop().toLowerCase())) return geo;
  }
  return null;
}

function parseCSV(text) {
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n").filter(l => l.trim());
  if (!lines.length) return {headers:[], rows:[]};
  const delim = (lines[0].match(/;/g)||[]).length > (lines[0].match(/,/g)||[]).length ? ";" :
                (lines[0].match(/\t/g)||[]).length > (lines[0].match(/,/g)||[]).length ? "\t" : ",";
  function splitRow(line) {
    const cells = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === delim && !inQ) { cells.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  }
  const headers = splitRow(lines[0]);
  const rows = lines.slice(1).map(l => splitRow(l)).filter(r => r.some(c => c));
  return {headers, rows, delim};
}

function guessMetric(colName) {
  const low = colName.toLowerCase();
  for (const [mk, patterns] of Object.entries(METRIC_HINTS)) {
    for (const p of patterns) {
      if (new RegExp(p, "i").test(low)) return mk;
    }
  }
  return "";
}

function guessCountryColumn(headers) {
  const hints = ["country","страна","geo","гео","region","регион"];
  for (let i = 0; i < headers.length; i++) {
    const low = headers[i].toLowerCase();
    for (const h of hints) { if (low.includes(h)) return i; }
  }
  return 0;
}

let csvState = {parsed: null, countryCol: 0, colMap: {}};

function applyCsvData() {
  const {parsed, countryCol, colMap} = csvState;
  if (!parsed || !parsed.rows.length) { showToast("❌ Нет данных"); return; }
  let updated = 0, skipped = 0;
  for (const row of parsed.rows) {
    const rawGeo = row[countryCol];
    const geo = resolveGeo(rawGeo);
    if (!geo) { skipped++; continue; }
    if (!D[geo]) D[geo] = {};
    for (const [colIdx, metric] of Object.entries(colMap)) {
      if (!metric || parseInt(colIdx) === countryCol) continue;
      const raw = row[parseInt(colIdx)];
      if (raw === "" || raw === undefined || raw === null) continue;
      const num = parseFloat(String(raw).replace(/\s/g,"").replace(",","."));
      if (!isNaN(num)) { D[geo][metric] = num; updated++; }
    }
  }
  saveDataToLocal();
  rebuildGeoList();
  closeDataEditor();
  render();
  showToast(`✅ CSV: ${updated} метрик обновлено` + (skipped ? `, ${skipped} строк пропущено` : ""));
}

      h += `<div class="geo-ed-row" onclick="editorGeo='${g}';refreshDataEditor()"><div style="width:8px;height:8px;border-radius:50%;background:${c.gw};flex-shrink:0"></div><span style="flex:1;font-size:12px">${g}</span><span class="mono" style="color:${c.tx};font-size:12px;font-weight:700">${NO(gs)?"—":Math.round(gs)}pt</span><span class="mono" style="color:#888;font-size:9px">${filled}/32</span><span style="color:#888;font-size:12px">›</span></div>`;
    });
    return h;
  }

  function buildGeoDetailTab(geo) {
    const d = D[geo] || {};
    let h = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><button class="btn-secondary" onclick="editorGeo=null;refreshDataEditor()" style="padding:4px 8px">‹</button><span style="color:#222;font-size:13px;font-weight:600">${geo}</span></div>`;
    Object.entries(CATS).forEach(([ck, ct]) => {
      h += `<div style="margin-bottom:12px"><div style="color:#777;font-size:10px;font-weight:600;margin-bottom:6px">${ct.i} ${ct.l}</div>`;
      ct.m.forEach(mk => {
        const t = DEF_TH[mk];
        const val = d[mk];
        const s = scr(mk, val);
        const c = cl(s);
        h += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:6px;height:6px;border-radius:50%;background:${NO(val)?"#333":c.gw};flex-shrink:0"></div><label style="color:#666;font-size:10px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.l}">${t.l}</label><input type="number" step="any" value="${NO(val)?"":val}" placeholder="null" onchange="updateGeoMetric('${geo}','${mk}',this.value)" class="ed-input" style="width:90px;font-size:12px;padding:5px;color:${NO(val)?"#333":c.tx}"><span class="mono" style="color:#d0d2da;font-size:8px;width:14px">${t.u}</span></div>`;
      });
      h += `</div>`;
    });
    h += `<button class="btn-primary" onclick="saveGeoEdits()">💾 Сохранить GEO</button>`;
    return h;
  }

  function buildMetaTab() {
    let h = `<div style="color:#777;font-size:11px;margin-bottom:12px">Настройки периода и флаги</div>`;
    const fields = [
      {k:"month",l:"Месяц (полный)",ph:"Апрель 2026"},
      {k:"month_short",l:"Месяц (кратко)",ph:"Apr"},
      {k:"prev_month_short",l:"Пред. месяц (кратко)",ph:"мар"},
      {k:"version",l:"Версия",ph:"v30"},
      {k:"updated",l:"Дата обновления",ph:"2026-05-01"},
    ];
    fields.forEach(f => {
      h += `<div style="margin-bottom:8px"><label style="color:#666;font-size:10px">${f.l}</label><input type="text" value="${escHtml(META[f.k]||"")}" placeholder="${f.ph}" onchange="META['${f.k}']=this.value" class="ed-input" style="margin-top:3px"></div>`;
    });
    h += `<div style="margin-top:16px;margin-bottom:8px"><div style="color:#666;font-size:10px;margin-bottom:4px">Trend Labels (через запятую)</div><input type="text" value="${escHtml(TL.join(","))}" onchange="TL=this.value.split(',').map(s=>s.trim()).filter(Boolean)" class="ed-input"></div>`;
    h += `<div style="margin-top:16px"><div style="color:#666;font-size:10px;margin-bottom:4px">Flags (JSON)</div><textarea id="flags-editor" class="ed-textarea" style="min-height:80px">${escHtml(JSON.stringify(FLAGS,null,2))}</textarea></div>`;
    h += `<button class="btn-primary" style="margin-top:10px" onclick="saveMetaEdits()">💾 Сохранить мету</button>`;
    return h;
  }

  window.refreshDataEditor = () => { const c = document.getElementById("dec"); if (c) c.innerHTML = buildEditor(); };
  overlay.innerHTML = `<div id="dec" style="width:100%;max-width:500px">${buildEditor()}</div>`;
  document.body.appendChild(overlay);
}

function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function closeDataEditor() { const o = document.getElementById("data-editor-overlay"); if (o) o.remove(); }

function handleFileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;
    if (file.name.endsWith(".csv") || file.name.endsWith(".tsv") || file.name.endsWith(".txt")) {
      initCsvState(text);
      editorTab = "csv";
      refreshDataEditor();
      showToast("📊 CSV загружен — настройте маппинг");
      return;
    }
    try {
      const ds = JSON.parse(text);
      applyDataset(ds, "localStorage");
      saveDataToLocal();
      rebuildGeoList();
      closeDataEditor();
      render();
      showToast("✅ Данные загружены из файла");
    } catch(err) {
      showToast("❌ Ошибка парсинга JSON: " + err.message);
    }
  };
  reader.readAsText(file);
}

function handleCsvFileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    initCsvState(ev.target.result);
    refreshDataEditor();
    showToast("📊 CSV загружен");
  };
  reader.readAsText(file);
}

function parseCsvFromTextarea() {
  const ta = document.getElementById("csv-paste");
  if (!ta || !ta.value.trim()) { showToast("❌ Вставьте CSV текст"); return; }
  initCsvState(ta.value);
  refreshDataEditor();
}

function initCsvState(text) {
  const parsed = parseCSV(text);
  csvState.parsed = parsed;
  csvState.countryCol = guessCountryColumn(parsed.headers);
  csvState.colMap = {};
  parsed.headers.forEach((hd, i) => {
    if (i === csvState.countryCol) return;
    const guess = guessMetric(hd);
    if (guess) csvState.colMap[i] = guess;
  });
}

function applyJsonEditor() {
  const textarea = document.getElementById("json-editor");
  if (!textarea) return;
  try {
    const ds = JSON.parse(textarea.value);
    applyDataset(ds, "localStorage");
    saveDataToLocal();
    rebuildGeoList();
    closeDataEditor();
    render();
    showToast("✅ JSON применён");
  } catch(err) {
    showToast("❌ Ошибка: " + err.message);
  }
}

function updateGeoMetric(geo, mk, val) {
  if (!D[geo]) D[geo] = {};
  D[geo][mk] = val === "" ? null : parseFloat(val);
}

function saveGeoEdits() {
  saveDataToLocal();
  rebuildGeoList();
  showToast("✅ GEO сохранён");
  refreshDataEditor();
}

function saveMetaEdits() {
  try {
    const fe = document.getElementById("flags-editor");
    if (fe) FLAGS = JSON.parse(fe.value);
  } catch(err) {
    showToast("❌ Ошибка в FLAGS JSON"); return;
  }
  saveDataToLocal();
  showToast("✅ Мета сохранена");
  render();
}

function downloadJson() {
  const ds = getDataset();
  const blob = new Blob([JSON.stringify(ds, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `health-check-${META.month_short||"data"}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("⬇ JSON скачан");
}

async function resetToFile() {
  localStorage.removeItem("hc_data");
  dataSource = "none";
  D = {}; PREV = {}; TREND = {}; HISTORY = {}; PLAT_TREND = []; PLAT_HISTORY = {}; TL = []; FLAGS = {}; SEGMENTS = {}; FUNNEL = {}; RETENTION_TABLE = {}; PLATFORM_COHORTS = []; GEO_COHORTS = {}; MARGIN_DYN = {};
  try {
    const res = await fetch("data.json?" + Date.now());
    if (res.ok) {
      const ds = await res.json();
      applyDataset(ds, "data.json");
    }
  } catch(e) {}
  rebuildGeoList();
  closeDataEditor();
  render();
  showToast("🔄 Сброшено к файлу");
}

// ═══ 11. SETTINGS MODAL ═══
let settingsView = "thresholds";
function openSettings() {
  settingsView = "thresholds";
  const overlay = document.createElement("div");
  overlay.id = "settings-overlay";
  overlay.className = "overlay";
  overlay.onclick = e => { if (e.target === overlay) closeSettings(); };
  function build() {
    let h = `<div class="modal"><div class="modal-head"><div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#1a1a2a;font-size:14px;font-weight:700">⚙ Скоринг</span><button onclick="closeSettings()" style="background:none;border:none;color:#777;font-size:20px;cursor:pointer;padding:4px 8px">×</button></div><div class="tab-bar" style="margin-top:10px"><button class="tab-btn" onclick="settingsView='formula';refreshSettings()" style="background:${settingsView==='formula'?'#d4d6e0':'transparent'};color:${settingsView==='formula'?'#ccc':'#444'}">📐 Формула</button><button class="tab-btn" onclick="settingsView='thresholds';refreshSettings()" style="background:${settingsView==='thresholds'?'#d4d6e0':'transparent'};color:${settingsView==='thresholds'?'#ccc':'#444'}">🎚 Пороги</button><button class="tab-btn" onclick="settingsView='weights';refreshSettings()" style="background:${settingsView==='weights'?'#d4d6e0':'transparent'};color:${settingsView==='weights'?'#ccc':'#444'}">⚖ Веса</button></div></div><div class="modal-body">`;
    if (settingsView === "formula") {
      h += buildFormulaView();
    } else if (settingsView === "weights") {
      h += buildWeightsView();
    } else {
      h += buildThresholdsView();
    }
    h += `</div><div class="modal-foot"><button class="btn-primary" onclick="saveSettings()">Сохранить</button></div></div>`;
    return h;
  }
  function buildFormulaView() {
    let h = `<div style="color:#444;font-size:11px;line-height:1.6">`;
    h += `<div style="color:#222;font-size:12px;font-weight:600;margin-bottom:8px">Как считается рейтинг GEO</div>`;
    h += `<div style="background:#f0f1f5;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #e0e2ea">`;
    h += `<div style="color:#7c83ff;font-size:10px;font-weight:600;margin-bottom:6px">1. Метрика → Score (0-100)</div>`;
    h += `<div style="color:#777;font-size:10px;margin-bottom:4px">Каждая метрика получает score от 0 до 100:</div>`;
    h += `<div class="mono" style="color:#888;font-size:9px;padding:4px 8px;background:#f0f1f5;border-radius:4px;margin-bottom:4px">если значение ≥ зелёный порог → 100<br>если значение ≤ жёлтый порог → 0-49 (линейно)<br>между порогами → 50-100 (линейно)</div>`;
    h += `<div style="display:flex;gap:6px;margin-top:6px"><span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#16a34a"></span><span style="font-size:9px;color:#666">Score ≥ 70</span></span><span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#d97706"></span><span style="font-size:9px;color:#666">40-69</span></span><span style="display:inline-flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#dc2626"></span><span style="font-size:9px;color:#666">&lt; 40</span></span></div>`;
    h += `</div>`;
    h += `<div style="background:#f0f1f5;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #e0e2ea">`;
    h += `<div style="color:#7c83ff;font-size:10px;font-weight:600;margin-bottom:6px">2. Блок = среднее метрик</div>`;
    h += `<div style="color:#777;font-size:10px">Каждый блок = среднее score его метрик (null пропускаются)</div>`;
    h += `</div>`;
    h += `<div style="background:#f0f1f5;border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #e0e2ea">`;
    h += `<div style="color:#7c83ff;font-size:10px;font-weight:600;margin-bottom:6px">3. GEO Score = взвешенная сумма блоков</div>`;
    h += `<div class="mono" style="color:#888;font-size:9px;padding:4px 8px;background:#f0f1f5;border-radius:4px">GEO = Σ(блок × вес) / Σ(веса активных блоков)</div>`;
    h += `<div style="margin-top:6px">`;
    Object.entries(CATS).forEach(([ck, ct]) => {
      h += `<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span style="font-size:12px">${ct.i}</span><span style="color:#666;font-size:10px;flex:1">${ct.l}</span><span class="mono" style="color:#7c83ff;font-size:10px;font-weight:600">${ct.w}%</span></div>`;
    });
    h += `</div></div>`;
    h += `<div style="background:#f0f1f5;border-radius:8px;padding:10px;border:1px solid #e0e2ea">`;
    h += `<div style="color:#7c83ff;font-size:10px;font-weight:600;margin-bottom:6px">4. Платформа = среднее GEO score</div>`;
    h += `<div style="color:#777;font-size:10px">Простое среднее по всем GEO (не взвешенное по NGR)</div>`;
    h += `</div>`;
    h += `<div style="margin-top:12px;padding:8px;background:#1a150822;border:1px solid #d9770615;border-radius:8px"><div style="color:#d97706;font-size:9px">💡 Пороги и веса настраиваются во вкладках «Пороги» и «Веса». Метрики null не участвуют в расчёте.</div></div>`;
    h += `</div>`;
    return h;
  }
  function buildWeightsView() {
    let h = `<div style="color:#666;font-size:11px;margin-bottom:10px">Веса блоков (определяют важность каждого блока в итоговом score GEO):</div>`;
    let totalW = 0;
    Object.entries(CATS).forEach(([ck, ct]) => { totalW += ct.w; });
    Object.entries(CATS).forEach(([ck, ct]) => {
      const pct = (ct.w / totalW * 100).toFixed(0);
      h += `<div style="padding:10px;background:#f0f1f5;border-radius:8px;margin-bottom:6px;border:1px solid #e0e2ea"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:14px">${ct.i}</span><span style="color:#333;font-size:12px;font-weight:600;flex:1">${ct.l}</span><span class="mono" style="color:#7c83ff;font-size:14px;font-weight:700">${ct.w}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${ct.w}%;background:#7c83ff"></div></div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">`;
      ct.m.forEach(mk => {
        const t = DEF_TH[mk];
        h += `<span style="font-size:8px;color:#888;background:#f0f1f5;padding:2px 5px;border-radius:3px">${t.l}</span>`;
      });
      h += `</div></div>`;
    });
    return h;
  }
  function buildThresholdsView() {
    let h = `<div class="tab-bar" style="margin-bottom:8px">`;
    Object.entries(CATS).forEach(([ck, ct]) => { h += `<button class="tab-btn" onclick="settingsCat='${ck}';refreshSettings()" style="background:${settingsCat===ck?"#d4d6e0":"transparent"};color:${settingsCat===ck?"#ccc":"#444"}">${ct.i} ${ct.w}%</button>`; });
    h += `</div>`;
    const metrics = CATS[settingsCat]?.m || [];
    metrics.forEach(mk => {
      const t = DEF_TH[mk]; const cur = getTH(mk);
      const dirLabel = t.d === "h" ? "↑ больше = лучше" : "↓ меньше = лучше";
      h += `<div style="padding:12px;background:#f0f1f5;border-radius:10px;margin-bottom:8px;border:1px solid #e0e2ea"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="color:#333;font-size:12px;font-weight:600">${t.l}</span><span class="mono" style="color:#888;font-size:8px">${dirLabel}</span></div><div style="display:flex;gap:10px;align-items:center"><div style="flex:1"><div style="display:flex;align-items:center;gap:3px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:#16a34a"></div><span style="color:#888;font-size:9px">${t.d==="h"?"≥":"≤"} зелёный</span></div><input type="number" value="${cur.g}" onchange="updateTH('${mk}','g',this.value)" class="ed-input" style="color:#16a34a"></div><div style="color:#999;padding-top:14px">→</div><div style="flex:1"><div style="display:flex;align-items:center;gap:3px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:#d97706"></div><span style="color:#888;font-size:9px">${t.d==="h"?"≥":"≤"} жёлтый</span></div><input type="number" value="${cur.y}" onchange="updateTH('${mk}','y',this.value)" class="ed-input" style="color:#d97706"></div></div></div>`;
    });
    return h;
  }
  window.refreshSettings = () => { const c = document.getElementById("stc"); if (c) c.innerHTML = build(); };
  overlay.innerHTML = `<div id="stc">${build()}</div>`;
  document.body.appendChild(overlay);
}
function updateTH(mk, f, val) { if (!customTH[mk]) customTH[mk] = {...DEF_TH[mk]}; customTH[mk][f] = parseFloat(val) || 0; }
function saveSettings() { localStorage.setItem("hc_th", JSON.stringify(customTH)); closeSettings(); render(); }
function closeSettings() { const o = document.getElementById("settings-overlay"); if (o) o.remove(); }

// ═══ 12. NAVIGATION ═══
function nav(g)    { state.geo = g; state.cat = null; render(); window.scrollTo(0,0); }
function navCat(c) { state.cat = c; render(); window.scrollTo(0,0); }
function navGeo()  { state.cat = null; render(); window.scrollTo(0,0); }
function navHome() { state.geo = null; state.cat = null; render(); window.scrollTo(0,0); }

// ═══ INIT ═══
loadData();
</script>
