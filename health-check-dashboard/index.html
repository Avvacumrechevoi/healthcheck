  return `<div class="metric-row" style="background:${n?"#12121e":`${c.bg}55`};border-left-color:${n?"#252540":c.gw};opacity:${n?.4:1}"><div style="width:7px;height:7px;border-radius:50%;background:${n?"#333":c.gw};${n?"":"box-shadow:0 0 5px "+c.gw};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="color:${n?"#444":"#999"};font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.l}${n?" ⬜":""}</div>${!n?`<div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.max(5,s??0))}%;background:linear-gradient(90deg,${c.gw}88,${c.gw})"></div></div>`:""}</div><div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0"><span class="mono" style="color:${n?"#333":c.tx};font-weight:700;font-size:14px">${n?"—":`${sign}${fmt(val)}${t.u}`}</span>${hasPrev&&!n?`<span class="mono" style="color:${arrowC};font-size:8px;opacity:.7">${arrow} фев ${fmt(prev)}</span>`:""}</div><span class="mono" style="color:#282840;font-size:8px;flex-shrink:0;width:36px;text-align:right">${t.d==="h"?"≥":"≤"}${fmt(t.g)}</span></div>`;
}

function summaryHTML(d, prev) {
  return `<div style="margin-bottom:10px"><div class="grid-sum">${SM.map(mk => {
    const t = getTH(mk); const v = d[mk]; const pv = prev?.[mk]; const s = scr(mk, v); const c = cl(s);
    const hasPrev = !NO(pv); const delta = hasPrev ? (v-pv) : 0;
    const arrow = hasPrev ? (delta > 0 ? "↑" : delta < 0 ? "↓" : "") : "";
    const arrowC = hasPrev ? (t.d === "h" ? (delta > 0 ? "#00e67688" : "#ff174488") : (delta < 0 ? "#00e67688" : "#ff174488")) : "";
    return `<div style="background:#0e0e1c;border-radius:8px;padding:7px 9px;border:1px solid ${!NO(v)?c.gw+"22":"#1a1a2e"};opacity:${NO(v)?.35:1}"><div style="color:#555;font-size:8px;margin-bottom:3px;line-height:1.2">${t.l}</div><div style="display:flex;align-items:baseline;gap:3px"><span class="mono" style="color:${!NO(v)?c.tx:"#333"};font-size:14px;font-weight:700">${!NO(v)&&v>0&&mk.includes("mom")?"+":""}${fmt(v)}${!NO(v)?t.u:""}</span>${hasPrev&&!NO(v)?`<span class="mono" style="color:${arrowC};font-size:8px">${arrow}</span>`:""}</div></div>`;
  }).join("")}</div></div>`;
}

function buildSparkSVG(data, h, w) {
  const pad = 4, cw = w-pad*2, ch = h-pad*2;
  const mn = Math.min(...data), mx = Math.max(...data), range = mx-mn || 1;
  const pts = data.map((v,i) => `${pad+i/(data.length-1)*cw},${pad+ch-(v-mn)/range*ch}`).join(" ");
  const lastV = data[data.length-1]; const lastC = lastV >= 0 ? "#00e676" : "#ff1744";
  const zeroY = mn < 0 ? pad+ch-(-mn)/range*ch : null;
  const circles = data.map((v,i) => {const x=pad+i/(data.length-1)*cw;const y_=pad+ch-(v-mn)/range*ch;const c=v>=0?"#00e676":"#ff1744";return `<circle cx="${x}" cy="${y_}" r="${i===data.length-1?3:1.5}" fill="${i===data.length-1?c:c+'66'}" ${i===data.length-1?'stroke="#fff" stroke-width="1"':""}/>`}).join("");
  const zeroLine = zeroY ? `<line x1="${pad}" y1="${zeroY}" x2="${w-pad}" y2="${zeroY}" stroke="#ffffff11" stroke-dasharray="3,3"/>` : "";
  return {svg:`<svg width="100%" viewBox="0 0 ${w} ${h}" style="display:block">${zeroLine}<polyline points="${pts}" fill="none" stroke="${lastC}88" stroke-width="1.5" stroke-linejoin="round"/>${circles}</svg>`, lastV, lastC};
}

function sparkHTML(geo) {
  const data = TREND[geo]; if (!data) return "";
  const {svg, lastV, lastC} = buildSparkSVG(data, 48, 200);
  const labels = TL.map((l,i) => `<span class="mono" style="color:${i===TL.length-1?"#666":"#222"};font-size:7px">${l}</span>`).join("");
  return `<div class="spark"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="mono" style="color:#444;font-size:9px">NGR тренд (8 мес)</span><span class="mono" style="color:${lastC};font-size:10px;font-weight:700">${fmtNGR(lastV)}</span></div>${svg}<div style="display:flex;justify-content:space-between;padding:0 2px">${labels}</div></div>`;
}

function platSparkHTML() {
  const {svg, lastV, lastC} = buildSparkSVG(PLAT_TREND, 40, 200);
  const labels = TL.map((l,i) => `<span class="mono" style="color:${i===TL.length-1?"#666":"#222"};font-size:7px">${l}</span>`).join("");
  return `<div class="spark"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="mono" style="color:#444;font-size:9px">NGR платформа (8 мес)</span><span class="mono" style="color:${lastC};font-size:10px;font-weight:700">${fmtNGR(lastV)}</span></div>${svg}<div style="display:flex;justify-content:space-between;padding:0 2px">${labels}</div></div>`;
}

function platBlocksHTML(geos) {
  let html = `<div style="margin-top:18px;background:#0e0e1c;border-radius:12px;border:1px solid #1a1a2e;padding:12px 10px"><div class="mono" style="color:#555;font-size:9px;font-weight:600;margin-bottom:10px;text-align:center">ПЛАТФОРМА · БЛОКИ (avg по GEO)</div><div style="display:flex;flex-direction:column;gap:4px">`;
  Object.entries(CATS).forEach(([ck, ct]) => {
    const vals = geos.map(g => catSc(g.d, ck)).filter(x => x !== null);
    const s = vals.length ? vals.reduce((a,b) => a+b, 0)/vals.length : null;
    const c = cl(s);
    html += `<div class="plat-block" onclick="toggleRanking('${ck}')" style="background:${c.bg}33;border-left-color:${NO(s)?"#252540":c.gw}"><span style="font-size:14px;width:20px;text-align:center">${ct.i}</span><div style="flex:1;min-width:0"><div style="color:${NO(s)?"#444":"#bbb"};font-size:11px;font-weight:600">${ct.l}</div><div class="bar-track" style="margin-top:3px"><div class="bar-fill" style="width:${Math.min(100,Math.max(3,s??0))}%;background:linear-gradient(90deg,${c.gw}88,${c.gw})"></div></div></div><span class="mono" style="color:${NO(s)?"#333":c.tx};font-weight:700;font-size:14px;min-width:28px;text-align:right">${NO(s)?"—":Math.round(s)}</span><span class="mono" style="color:#282840;font-size:8px;min-width:24px;text-align:right">${ct.w}%</span></div>`;
    // Ranking dropdown (hidden by default, toggled by toggleRanking)
    html += `<div id="rank-${ck}" style="display:none;padding:2px 0 6px 28px">`;
    const ranked = geos.map(g => ({g:g.g, s:catSc(g.d, ck), d:g.d})).filter(r => r.s !== null).sort((a,b) => b.s - a.s);
    ranked.forEach((r, i) => {
      const rc = cl(r.s);
      html += `<div class="rank-row" onclick="nav('${r.g}')" style="background:${rc.bg}33"><span class="mono" style="color:#444;font-size:9px;width:16px">${i+1}</span><span style="font-size:10px;flex:1">${r.g}</span><span class="mono" style="color:${rc.tx};font-weight:700;font-size:12px">${Math.round(r.s)}</span></div>`;
    });
    html += `</div>`;
  });
  return html + `</div></div>`;
}

function crumbHTML(geo, cat) {
  let h = `<div class="crumb"><span onclick="navHome()" style="color:#555">GEO</span><span style="color:#252540;font-size:10px;padding:0">›</span>`;
  h += `<span onclick="navGeo()" style="color:${cat?"#555":"#888"};background:${cat?"transparent":"#1a1a2e"}">${geo.split(" ").pop()}</span>`;
  if (cat) { const ct = CATS[cat]; h += `<span style="color:#252540;font-size:10px;padding:0">›</span><span style="color:#888;background:#1a1a2e;cursor:default">${ct.i} ${ct.l}</span>`; }
  return h + `</div>`;
}

function navHTML(idx) {
  const p = idx > 0 ? geoList[idx-1] : null, nx = idx < geoList.length-1 ? geoList[idx+1] : null;
  return `<div class="nav"><button style="color:${p?"#555":"#1a1a28"}" ${p?`onclick="nav('${p}')"`:"disabled"}>‹</button><span class="mono" style="color:#666;font-size:11px">${idx+1}/${geoList.length}</span><button style="color:${nx?"#555":"#1a1a28"}" ${nx?`onclick="nav('${nx}')"`:"disabled"}>›</button></div>`;
}

// ═══ 6. RENDER ═══
let state = {geo: null, cat: null};
const geoList = Object.keys(D);

function render() {
  const app = document.getElementById("app");
  const geos = Object.entries(D).map(([g,d]) => ({g, s:geoSc(d), d, flag:!!FLAGS[g]})).sort((a,b) => (a.s??-1) - (b.s??-1));
  const valid = geos.filter(g => !NO(g.s));
  const ps = valid.length ? valid.reduce((a,g) => a+g.s, 0)/valid.length : null;
  const crit = geos.filter(g => !NO(g.s) && g.s < 40).length;

  let html = `<div class="header"><div><h1>HEALTH CHECK</h1><p class="mono" style="color:#2a2a40;font-size:9px;margin-top:2px">март 2026 · v27</p></div><div style="display:flex;gap:2px"><button onclick="copyTelegramReport()" title="Telegram" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;color:#3a3a55;border:none;background:none" onmouseenter="this.style.color='#7c83ff'" onmouseleave="this.style.color='#3a3a55'"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l.002.001-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.434z"/></svg></button><button onclick="openSettings()" title="Настройки" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;color:#3a3a55;border:none;background:none" onmouseenter="this.style.color='#7c83ff'" onmouseleave="this.style.color='#3a3a55'"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg></button></div></div>`;

  if (!state.geo) {
    html += `<div style="text-align:center;margin-bottom:12px">${sphereHTML(ps,82,"ПЛАТФОРМА",`${crit} crit · ${geos.length} geo`)}</div>`;
    html += platSparkHTML();
    html += `<div class="line"></div>`;
    // v27: NGR under spheres instead of status text
    html += `<div class="grid-geo">${geos.map(({g,s,d,flag}) => `<div onclick="nav('${g}')" style="animation:fi .3s ease">${sphereHTML(s,62,g,fmtNGR(d.ngr),flag)}</div>`).join("")}</div>`;
    html += platBlocksHTML(geos);
    if (crit > 0) {
      html += `<div class="problems"><div class="mono" style="color:#ff1744;font-size:10px;font-weight:700;margin-bottom:6px">🚨 ПРОБЛЕМЫ</div>`;
      geos.filter(g => !NO(g.s) && g.s < 40).forEach(g => {
        const fl = FLAGS[g.g];
        const w = Object.keys(DEF_TH).map(k => ({k, s:scr(k, g.d[k])})).filter(m => !NO(m.s) && m.s < 25).slice(0,3).map(m => DEF_TH[m.k].l);
        html += `<div class="problems-item" onclick="nav('${g.g}')"><span class="mono" style="color:#ff8a80;font-size:11px">${fl?fl.icon+" ":""}${g.g} · ${Math.round(g.s)}pt</span><div style="color:#553344;font-size:9px;margin-top:2px">${fl?fl.msg+(w.length?" · ":""):""} ${w.join(" · ")}</div></div>`;
      });
      html += `</div>`;
    }
  } else if (state.geo && !state.cat) {
    const g = state.geo, d = D[g], fl = FLAGS[g], prev = PREV[g] || {};
    const gs = geoSc(d); const idx = geoList.indexOf(g);
    html += crumbHTML(g);
    html += navHTML(idx);
    if (fl) html += `<div class="alert"><span class="mono" style="color:#ff8a80;font-size:11px;font-weight:600">${fl.icon} ${fl.msg}</span><span style="color:#55333e;font-size:9px;margin-left:6px">${fl.detail}</span></div>`;
    html += `<div style="text-align:center;margin-bottom:12px">${sphereHTML(gs,76,g,cl(gs).lb,!!fl)}</div>`;
    html += summaryHTML(d, prev);
    html += sparkHTML(g);
    html += `<div class="line"></div><div class="grid-cat">`;
    Object.entries(CATS).forEach(([ck, ct]) => { const cs = catSc(d, ck); html += `<div onclick="navCat('${ck}')" style="animation:fi .3s ease">${sphereHTML(cs,54,`${ct.i} ${ct.l}`,`${ct.w}% · ${cl(cs).lb}`)}</div>`; });
    html += `</div>`;
    const worst = Object.keys(DEF_TH).map(k => ({k, s:scr(k, d[k]), v:d[k]})).filter(m => !NO(m.s) && m.s < 40).sort((a,b) => a.s - b.s);
    if (worst.length) html += `<div style="margin-top:18px"><div class="mono" style="color:#ff1744;font-size:10px;font-weight:700;margin-bottom:8px;text-align:center">⚠ КРАСНЫЕ (${worst.length})</div><div style="display:flex;flex-direction:column;gap:5px">${worst.slice(0,6).map(m => metricHTML(m.k, m.v, prev[m.k])).join("")}</div></div>`;
    const filled = Object.keys(DEF_TH).filter(k => !NO(d[k])).length;
    html += `<div style="margin-top:12px;padding:10px;background:#111122;border-radius:8px;border:1px solid #1e1e35"><div class="mono" style="color:#444;font-size:9px">${filled}/32 метрик</div></div>`;
  } else if (state.geo && state.cat) {
    const g = state.geo, d = D[g], ct = CATS[state.cat], prev = PREV[g] || {}, fl = FLAGS[g];
    const cs = catSc(d, state.cat); const idx = geoList.indexOf(g);
    html += crumbHTML(g, state.cat);
    html += navHTML(idx);
    if (fl && state.cat === "payments") html += `<div class="alert"><span class="mono" style="color:#ff8a80;font-size:11px;font-weight:600">${fl.icon} ${fl.msg}</span></div>`;
    html += `<div style="text-align:center;margin-bottom:12px">${sphereHTML(cs,68,`${ct.i} ${ct.l}`,`${ct.w}% веса · ${g.split(" ").pop()}`)}</div><div class="line"></div>`;
    html += `<div style="display:flex;flex-direction:column;gap:5px">${ct.m.map(mk => metricHTML(mk, d[mk], prev[mk])).join("")}</div>`;
  }
  app.innerHTML = html;
}

function toggleRanking(ck) {

// ═══ 8. TELEGRAM REPORT ═══
function copyTelegramReport() {
  const geos = Object.entries(D).map(([g,d]) => ({g, s:geoSc(d), d, flag:!!FLAGS[g]})).sort((a,b) => (b.s??-1) - (a.s??-1));
  const valid = geos.filter(g => !NO(g.s));
  const ps = valid.length ? valid.reduce((a,g) => a+g.s, 0)/valid.length : null;
  const totalNGR = Object.values(D).reduce((s,d) => s + (d.ngr || 0), 0);

  let txt = `📊 HEALTH CHECK · Март 2026\n`;
  txt += `Платформа: ${Math.round(ps)}pt · NGR: ${fmtNGR(totalNGR)}\n\n`;

  // GEO ranking
  txt += `🏆 Рейтинг GEO:\n`;
  geos.forEach((g, i) => {
    const icon = g.flag ? "⛔" : g.s >= 70 ? "🟢" : g.s >= 40 ? "🟡" : "🔴";
    txt += `${icon} ${g.g} — ${Math.round(g.s)}pt · ${fmtNGR(g.d.ngr)}`;
    if (g.d.ngr_mom) txt += ` (${g.d.ngr_mom > 0 ? "+" : ""}${g.d.ngr_mom.toFixed(0)}% MoM)`;
    txt += `\n`;
  });

  // Problems
  const reds = geos.filter(g => !NO(g.s) && g.s < 40);
  if (reds.length) {
    txt += `\n🚨 Проблемные GEO:\n`;
    reds.forEach(g => {
      const fl = FLAGS[g.g];
      const worst = Object.keys(DEF_TH).map(k => ({k, s:scr(k, g.d[k])})).filter(m => !NO(m.s) && m.s < 25).slice(0,3).map(m => DEF_TH[m.k].l);
      txt += `• ${fl?fl.icon+" ":""}${g.g}: ${worst.join(", ")}\n`;
    });
  }

  // Platform blocks
  txt += `\n📦 Блоки платформы:\n`;
  Object.entries(CATS).forEach(([ck, ct]) => {
    const vals = geos.map(g => catSc(g.d, ck)).filter(x => x !== null);
    const s = vals.length ? vals.reduce((a,b) => a+b, 0)/vals.length : null;
    const icon = NO(s) ? "⬜" : s >= 70 ? "🟢" : s >= 40 ? "🟡" : "🔴";
    txt += `${ct.i} ${ct.l}: ${icon} ${NO(s)?"—":Math.round(s)}pt (${ct.w}%)\n`;
  });

  navigator.clipboard.writeText(txt).then(() => {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = "📋 Скопировано для Telegram";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }).catch(() => {
    prompt("Скопируйте текст:", txt);
  });
}

// ═══ 9. SETTINGS MODAL ═══
function openSettings() {
  const overlay = document.createElement("div");
  overlay.id = "settings-overlay";
  overlay.style.cssText = "position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);display:flex;justify-content:center;padding-top:5vh";
  overlay.onclick = e => { if (e.target === overlay) closeSettings(); };
  function build() {
    const metrics = CATS[settingsCat]?.m || [];
    let h = `<div style="width:100%;max-width:460px;max-height:90vh;background:#0e0e1a;border:1px solid #1e1e35;border-radius:16px;display:flex;flex-direction:column;overflow:hidden;animation:fi .25s ease"><div style="padding:14px 16px 10px;border-bottom:1px solid #1a1a2e;flex-shrink:0"><div style="display:flex;justify-content:space-between;align-items:center"><span style="color:#e0e0e0;font-size:14px;font-weight:700">⚙ Пороги</span><button onclick="closeSettings()" style="background:none;border:none;color:#444;font-size:20px;cursor:pointer;padding:4px 8px">×</button></div><div style="display:flex;gap:2px;margin-top:10px;overflow-x:auto">`;
    Object.entries(CATS).forEach(([ck, ct]) => { h += `<button onclick="settingsCat='${ck}';refreshSettings()" style="padding:6px 10px;border-radius:5px;font-size:12px;cursor:pointer;border:none;background:${settingsCat===ck?"#1e1e35":"transparent"};color:${settingsCat===ck?"#ccc":"#444"};flex-shrink:0;min-height:32px">${ct.i} ${ct.w}%</button>`; });
    h += `</div></div><div style="flex:1;overflow-y:auto;padding:10px 16px;-webkit-overflow-scrolling:touch">`;
    metrics.forEach(mk => {
      const t = DEF_TH[mk]; const cur = getTH(mk);
      h += `<div style="padding:12px;background:#111122;border-radius:10px;margin-bottom:8px;border:1px solid #1a1a2e"><div style="color:#bbb;font-size:12px;font-weight:600;margin-bottom:8px">${t.l}</div><div style="display:flex;gap:10px;align-items:center"><div style="flex:1"><div style="display:flex;align-items:center;gap:3px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:#00e676"></div><span style="color:#555;font-size:9px">${t.d==="h"?"≥":"≤"}</span></div><input type="number" value="${cur.g}" onchange="updateTH('${mk}','g',this.value)" style="width:100%;padding:7px;background:#0a0a14;border:1px solid #252540;border-radius:6px;color:#00e676;font-size:14px;font-family:monospace;font-weight:600;outline:none;min-height:36px"></div><div style="color:#222;padding-top:14px">→</div><div style="flex:1"><div style="display:flex;align-items:center;gap:3px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:50%;background:#ffc107"></div><span style="color:#555;font-size:9px">${t.d==="h"?"≥":"≤"}</span></div><input type="number" value="${cur.y}" onchange="updateTH('${mk}','y',this.value)" style="width:100%;padding:7px;background:#0a0a14;border:1px solid #252540;border-radius:6px;color:#ffc107;font-size:14px;font-family:monospace;font-weight:600;outline:none;min-height:36px"></div></div></div>`;
    });
    h += `</div><div style="padding:10px 16px;border-top:1px solid #1a1a2e;flex-shrink:0"><button onclick="saveSettings()" style="width:100%;padding:10px;border-radius:8px;border:none;cursor:pointer;background:#7c83ff;color:#fff;font-size:13px;font-weight:600;min-height:40px">Сохранить</button></div></div>`;
    return h;
  }
  window.refreshSettings = () => { const c = document.getElementById("stc"); if (c) c.innerHTML = build(); };
  overlay.innerHTML = `<div id="stc">${build()}</div>`;
  document.body.appendChild(overlay);
}
function updateTH(mk, f, val) { if (!customTH[mk]) customTH[mk] = {...DEF_TH[mk]}; customTH[mk][f] = parseFloat(val) || 0; }
function saveSettings() { localStorage.setItem("hc_th", JSON.stringify(customTH)); closeSettings(); render(); }
function closeSettings() { const o = document.getElementById("settings-overlay"); if (o) o.remove(); }

// ═══ 10. NAVIGATION ═══
function nav(g)    { state.geo = g; state.cat = null; render(); window.scrollTo(0,0); }
function navCat(c) { state.cat = c; render(); window.scrollTo(0,0); }
function navGeo()  { state.cat = null; render(); window.scrollTo(0,0); }
function navHome() { state.geo = null; state.cat = null; render(); window.scrollTo(0,0); }

// ═══ INIT ═══
render();
</script>
